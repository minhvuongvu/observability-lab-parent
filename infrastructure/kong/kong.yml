# ---------------------------------------------------------------------------
# Kong declarative configuration (DB-less mode).
#
# In DB-less mode this file IS the gateway's entire state. Nothing can be
# changed by poking the admin API, so the routing and policy a request passes
# through is always exactly what is in version control and what a reviewer saw.
#
# Reload after editing:  ./scripts/gateway.sh reload
# Validate before that:  ./scripts/gateway.sh validate
# ---------------------------------------------------------------------------
_format_version: "3.0"

# ---------------------------------------------------------------------------
# Upstreams
#
# Named upstreams rather than a hostname on the service, because that is what
# gives Kong somewhere to hang health checks. A service pointed straight at a
# host has no notion of the target being up or down; an upstream does, and stops
# sending traffic to a target that is failing.
#
# Targets are host.docker.internal because the services currently run on the
# developer's machine while Kong runs in a container. Once the services are
# containerised this becomes their compose service name and nothing else here
# changes - which is the other reason the address lives in exactly one place.
# ---------------------------------------------------------------------------
upstreams:
  - name: order-service.upstream
    targets:
      - target: host.docker.internal:8081
        weight: 100
    healthchecks:
      active:
        type: http
        # The readiness probe, not the liveness one. Liveness answers "should
        # this be restarted"; readiness answers "should traffic be sent here",
        # which is precisely the question a load balancer is asking.
        http_path: /actuator/health/readiness
        concurrency: 2
        timeout: 2
        healthy:
          interval: 10
          successes: 2
          http_statuses: [200]
        unhealthy:
          interval: 5
          http_failures: 3
          tcp_failures: 3
          timeouts: 3
          http_statuses: [429, 500, 502, 503, 504]
      passive:
        healthy:
          successes: 3
          # 4xx counts as healthy on purpose. A 404 or a 422 from these services
          # is a correct answer to a bad request, not a sign the upstream is
          # broken; treating them as failures would take a perfectly healthy
          # service out of rotation the moment clients started sending rubbish.
          http_statuses: [200, 201, 202, 204, 400, 401, 403, 404, 409, 422]
        unhealthy:
          http_failures: 5
          timeouts: 3
          http_statuses: [500, 502, 503, 504]

  - name: inventory-service.upstream
    targets:
      - target: host.docker.internal:8082
        weight: 100
    healthchecks:
      active:
        type: http
        http_path: /actuator/health/readiness
        concurrency: 2
        timeout: 2
        healthy:
          interval: 10
          successes: 2
          http_statuses: [200]
        unhealthy:
          interval: 5
          http_failures: 3
          tcp_failures: 3
          timeouts: 3
          http_statuses: [429, 500, 502, 503, 504]
      passive:
        healthy:
          successes: 3
          http_statuses: [200, 201, 202, 204, 400, 401, 403, 404, 409, 422]
        unhealthy:
          http_failures: 5
          timeouts: 3
          http_statuses: [500, 502, 503, 504]

# ---------------------------------------------------------------------------
# Services and routes
#
# Only the business APIs are routed. /actuator is deliberately absent: health
# detail, environment properties and metrics describe internal topology and
# have no business being reachable from outside. Operators reach them on the
# service port directly, which is bound to loopback.
# ---------------------------------------------------------------------------
services:
  - name: order-service
    host: order-service.upstream
    protocol: http
    port: 8081
    # Shorter than the service's own budget so a hung upstream surfaces here as
    # a gateway timeout rather than as a client sitting on an open socket.
    connect_timeout: 2000
    write_timeout: 15000
    read_timeout: 15000
    # Only for connection-level failures; Kong does not retry a request that the
    # upstream already answered, so this cannot replay a POST that succeeded.
    retries: 2
    routes:
      - name: orders
        paths:
          - /api/v1/orders
        # The service owns the full path. Stripping it would make the gateway's
        # routing table part of the service's URL contract.
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        preserve_host: false
    plugins:
      - name: rate-limiting
        config:
          minute: 120
          hour: 3000
          # Counters live in this node's memory. Correct because the lab runs a
          # single Kong node; a cluster would need the redis policy so that
          # nodes share a count instead of each allowing the full quota.
          policy: local
          # If the counter store fails, let traffic through rather than refusing
          # every request. An outage of the limiter must not become an outage.
          fault_tolerant: true
          hide_client_headers: false
      - name: request-transformer
        config:
          remove:
            headers:
              # A client must never be able to assert its own identity. The
              # services derive the authenticated subject from the verified token
              # themselves, so the gateway's only job here is to strip any inbound
              # X-User-Id - otherwise a caller could forge one and it would be
              # logged as fact.
              - X-User-Id

  - name: inventory-service
    host: inventory-service.upstream
    protocol: http
    port: 8082
    connect_timeout: 2000
    write_timeout: 15000
    read_timeout: 15000
    retries: 2
    routes:
      - name: stock
        paths:
          - /api/v1/stock
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        preserve_host: false
    plugins:
      - name: rate-limiting
        config:
          minute: 120
          hour: 3000
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: request-transformer
        config:
          remove:
            headers:
              - X-User-Id

# ---------------------------------------------------------------------------
# Global plugins
# ---------------------------------------------------------------------------
plugins:
  # Bounds the request body at the edge. Without it, the only thing standing
  # between a client and the service's heap is the service's own parser.
  - name: request-size-limiting
    config:
      allowed_payload_size: 1
      size_unit: megabytes

  # ---------------------------------------------------------------------------
  # JWT verification (step 07).
  #
  # Enforcing. Every request to a routed service must carry a bearer token whose
  # signature verifies against the Keycloak realm's public key - held by the
  # consumer below - and whose `iss` claim names that key. A request with no
  # token, an unknown issuer or a bad signature is refused here with 401 before
  # it ever reaches a service.
  #
  #   - key_claim_name: iss selects the verifying key by the token's issuer, so
  #     the realm's public key is found by the exact issuer string it was minted
  #     with.
  #   - exp is verified, so an expired token is refused rather than merely old.
  #   - the token IS forwarded upstream. The services are OAuth2 resource servers
  #     in their own right (defense in depth): they re-validate signature and
  #     issuer and enforce per-endpoint role authorization, which an edge keyed on
  #     one realm consumer cannot. Verifying twice is deliberate - the gateway and
  #     the service fail closed independently.
  # ---------------------------------------------------------------------------
  - name: jwt
    enabled: true
    config:
      key_claim_name: iss
      claims_to_verify:
        - exp
      run_on_preflight: false

# ---------------------------------------------------------------------------
# Consumers
#
# One consumer stands for the Keycloak realm, not a person. The community JWT
# plugin verifies with a static key rather than fetching JWKS, so the realm's
# public key lives here and is looked up by the `iss` string carried in each
# token (key_claim_name above). It is the exact public half of the RSA key the
# realm import pins, so it keeps verifying across stack rebuilds.
#
# The `key` is the token issuer. If KEYCLOAK_PORT or KEYCLOAK_REALM in .env
# change, the issuer changes and this value must change with it, or every token
# is rejected as coming from an unknown issuer.
# ---------------------------------------------------------------------------
consumers:
  - username: keycloak-observability
    jwt_secrets:
      - key: "http://localhost:8080/realms/observability"
        algorithm: RS256
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAuYE7UFCC0NGE2UoKkFYz
          +M9WhbiJg4YKOfbqzXZKHXrrFKxH5s9n+ULqkkKbvUuPY6Zhz+u069yWDVWeb5An
          yYY7+QEifO74hLTJcnf/Ar4mc+vn18aMusrCeB75jsocGEep1iHN1Dc5mLO3KuVy
          ZJakcb+g+6SCwa/o/wX/i1tmm2jtRweRGNAVwttrlNONEJJmOUbB47YeBzR9iJTK
          6MnQedydW2X0KrNZuHamLhCh/AZPvSxaRHzZiv+tr2UPVqBlrNyJX5qfWMAenLKp
          5Sp+FT4gDBYC/HHhH+JMW/CNg3PhqQU+4I7JnZ69/L4eU84n9EMnpgKkzGqvZGFT
          vwIDAQAB
          -----END PUBLIC KEY-----
