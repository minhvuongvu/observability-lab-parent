# ---------------------------------------------------------------------------
# Fluentd - pipeline 3 of 3.
#
#     services -> JSON file -> Fluentd -> OpenSearch -> OpenSearch Dashboards
#
# The one that goes somewhere other than Loki, which is the reason it exists in
# this lab. Loki indexes labels and greps the rest; OpenSearch indexes every
# field. That difference is the whole trade:
#
#   Loki       cheap to ingest, cheap to store, queries are label lookup + grep
#   OpenSearch expensive to ingest and store, but any field is a real query -
#              aggregations, full-text relevance, arbitrary boolean filters
#
# Neither is the "right" one. Running both and querying the same records
# through each is how the difference stops being abstract.
#
# Started only with the `search` compose profile, because OpenSearch needs
# roughly two gigabytes that a laptop running Oracle and Kafka does not have
# spare. See docs/Logging.md.
# ---------------------------------------------------------------------------

# Quieten Fluentd's own logs; without this it logs every flush at info.
<system>
  log_level warn
</system>

<source>
  @type tail
  @id in_lab_json
  path /var/log/lab/*.json
  exclude_path ["/var/log/lab/*.gz"]
  # Where it left off, on a named volume so a restart resumes rather than
  # re-ingesting every file.
  pos_file /var/lib/fluentd/lab-json.pos
  tag lab.service
  # Follow the file across rotation by inode rather than by name, so a roll
  # does not lose the tail.
  follow_inodes true
  refresh_interval 5
  read_from_head true

  <parse>
    @type json
    # The application's own timestamp, not the moment Fluentd read the line.
    time_key @timestamp
    time_type string
    time_format %Y-%m-%dT%H:%M:%S.%NZ
    keep_time_key true
  </parse>
</source>

# Stamp the pipeline, so a record in OpenSearch says how it got there.
<filter lab.**>
  @type record_transformer
  @id add_pipeline_metadata
  <record>
    pipeline fluentd
    agent fluentd
  </record>
</filter>

<match lab.**>
  @type opensearch
  @id out_opensearch
  host opensearch
  port 9200
  scheme http
  # Security plugin is disabled on the lab's single node, so there is no
  # credential to hold here. A real cluster needs one, and it would come from
  # the environment rather than from this file.
  logstash_format true
  logstash_prefix lab-logs
  # Daily indices. Retention becomes "delete indices older than N days", which
  # is a metadata operation rather than a mass delete-by-query.
  logstash_dateformat %Y.%m.%d
  include_timestamp true
  # OpenSearch 2.x removed mapping types; sending one is an error.
  suppress_type_name true
  # Tolerate the backend being slow or briefly absent rather than dropping.
  request_timeout 30s
  reload_connections false
  reconnect_on_error true
  reload_on_failure true

  <buffer>
    @type file
    path /var/lib/fluentd/buffer/opensearch
    flush_mode interval
    flush_interval 5s
    # On disk, so an OpenSearch outage is a delay rather than data loss.
    chunk_limit_size 8MB
    total_limit_size 512MB
    retry_type exponential_backoff
    retry_max_interval 60s
    retry_forever false
    retry_timeout 1h
    flush_thread_count 2
    # Never block the tail on a slow flush.
    overflow_action drop_oldest_chunk
  </buffer>
</match>
