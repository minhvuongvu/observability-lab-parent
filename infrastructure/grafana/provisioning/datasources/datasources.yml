# ---------------------------------------------------------------------------
# Grafana datasources, provisioned from this file.
#
# Not clicked in through the UI. A datasource that exists only in someone's
# browser session is not part of the system: it cannot be reviewed, it is lost
# when the volume is recreated, and nobody else's Grafana has it.
#
# The profiles datasource arrives with step 13.
# ---------------------------------------------------------------------------
apiVersion: 1

datasources:

  # -------------------------------------------------------------------------
  # Prometheus - the default for metrics. Holds 24 hours locally and is the
  # engine that evaluates the alert rules.
  # -------------------------------------------------------------------------
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      # Must match prometheus.yml's scrape_interval, or Grafana picks step
      # values that silently produce gaps or over-smoothed lines.
      timeInterval: 15s
      manageAlerts: false

  # -------------------------------------------------------------------------
  # VictoriaMetrics - the same samples, a different engine. Answers PromQL, so
  # any panel can be pointed at either and compared on identical input. This is
  # where to query anything older than Prometheus' local retention.
  # -------------------------------------------------------------------------
  - name: VictoriaMetrics
    type: prometheus
    uid: victoriametrics
    access: proxy
    url: http://victoriametrics:8428
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      manageAlerts: false

  # -------------------------------------------------------------------------
  # Loki - the always-on log store, fed by both Promtail and Fluent Bit.
  # -------------------------------------------------------------------------
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    # Grafana talks to Loki over the compose network, so this is the service
    # name and the internal port - not the host-published one.
    url: http://loki:3100
    editable: false
    jsonData:
      # Cap what one careless query can pull into the browser.
      maxLines: 1000
      # The link that makes the two signals one workflow: every log line
      # carries trace_id, and this turns it into a button that opens the trace
      # in Tempo. Going the other way - trace to logs - is configured on the
      # Tempo datasource below.
      derivedFields:
        - name: TraceID
          matcherType: label
          matcherRegex: trace_id
          url: "$${__value.raw}"
          datasourceUid: tempo

  # -------------------------------------------------------------------------
  # OpenSearch - only reachable when the `search` profile is up. Provisioned
  # unconditionally so that starting the profile is the only step needed; until
  # then Grafana simply shows it as unreachable, which is honest.
  # -------------------------------------------------------------------------
  - name: OpenSearch
    type: elasticsearch
    uid: opensearch
    access: proxy
    url: http://opensearch:9200
    # Fluentd writes daily indices named lab-logs-YYYY.MM.DD.
    database: "[lab-logs-]YYYY.MM.DD"
    editable: false
    jsonData:
      index: "[lab-logs-]YYYY.MM.DD"
      interval: Daily
      timeField: "@timestamp"
      # OpenSearch 2.x answers the version handshake as Elasticsearch 7.10,
      # which is the fork point. Grafana's elasticsearch datasource speaks that
      # dialect, which is why this works at all.
      maxConcurrentShardRequests: 5
      logMessageField: message
      logLevelField: level

  # -------------------------------------------------------------------------
  # Elasticsearch - also behind the `search` profile. Nothing ships to it by
  # default; it is here to be pointed at when comparing the two.
  # -------------------------------------------------------------------------
  - name: Elasticsearch
    type: elasticsearch
    uid: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "[lab-logs-]YYYY.MM.DD"
    editable: false
    jsonData:
      index: "[lab-logs-]YYYY.MM.DD"
      interval: Daily
      timeField: "@timestamp"
      maxConcurrentShardRequests: 5
      logMessageField: message
      logLevelField: level

  # -------------------------------------------------------------------------
  # Tempo - traces.
  #
  # Configured in both directions: a log line links out to its trace (see the
  # Loki datasource above), and a trace links back to the logs for that same
  # trace id. Without both, correlating them means copying an id between two
  # browser tabs, which is what people actually stop doing during an incident.
  # -------------------------------------------------------------------------
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      # Trace -> logs, for the same trace id, over the window the trace covers.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: '{service="$${__span.tags["service.name"]}"} |= "$${__trace.traceId}"'

      # Trace -> metrics. Jumps from a slow span to the request rate of the
      # service that produced it.
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
        queries:
          - name: 'Request rate'
            query: 'sum(rate(http_server_requests_seconds_count{service="$${__span.tags["service.name"]}"}[$$__rate_interval]))'

      # The service graph and RED metrics Tempo derives from spans and
      # remote-writes to Prometheus. This is what makes the Service Graph tab
      # work without either service having been instrumented to produce it.
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false

  # -------------------------------------------------------------------------
  # Jaeger and Zipkin receive the same spans from the collector. Provisioned so
  # one trace can be opened in all three and compared - which is the only
  # honest way to choose between them.
  # -------------------------------------------------------------------------
  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
        filterByTraceID: true

  - name: Zipkin
    type: zipkin
    uid: zipkin
    access: proxy
    url: http://zipkin:9411
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
        filterByTraceID: true
