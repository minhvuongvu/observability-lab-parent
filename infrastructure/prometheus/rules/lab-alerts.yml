# ---------------------------------------------------------------------------
# Recording and alerting rules.
#
# Deliberately few. A rule that fires on something nobody would act on trains
# people to ignore the alert channel, and an alert channel that is ignored is
# worse than no alerting at all. Each of these describes a condition a person
# would genuinely want to be woken for, or a query expensive enough to be worth
# precomputing.
#
# There is no Alertmanager in this lab: these evaluate and show up as firing in
# Prometheus and Grafana, which is enough to see the mechanics without adding a
# routing and paging component that step 11 does not call for.
# ---------------------------------------------------------------------------

groups:

  # -------------------------------------------------------------------------
  # Recording rules: precomputed answers to questions dashboards ask
  # constantly. Evaluating them once here is cheaper than every panel doing
  # the same aggregation on every refresh.
  # -------------------------------------------------------------------------
  - name: lab-recording
    interval: 30s
    rules:
      - record: lab:http_request_rate:5m
        expr: sum by (service) (rate(http_server_requests_seconds_count[5m]))

      - record: lab:http_error_rate:5m
        expr: |
          sum by (service) (rate(http_server_requests_seconds_count{outcome=~"SERVER_ERROR|CLIENT_ERROR"}[5m]))

      # The 99th percentile computed from bucket counts, which is the only form
      # that aggregates correctly across instances.
      - record: lab:http_latency_p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (service, le) (rate(http_server_requests_seconds_bucket[5m])))

      # The gRPC hop, in the same shape as the HTTP one so the two are directly
      # comparable rather than expressed in two different vocabularies.
      - record: lab:grpc_request_rate:5m
        expr: sum by (service, grpc_service) (rate(grpc_server_requests_total[5m]))

      # Faults, NOT non-OK. NOT_FOUND for an untracked SKU and
      # FAILED_PRECONDITION for a shortage are answers, and counting them here
      # would make the error rate track catalogue quality instead of service
      # health - producing an alert people learn to mute.
      - record: lab:grpc_fault_rate:5m
        expr: |
          sum by (service, grpc_service) (rate(grpc_server_requests_total{
            grpc_status=~"INTERNAL|UNKNOWN|DATA_LOSS|UNAVAILABLE"}[5m]))

      - record: lab:grpc_latency_p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (service, grpc_method, le) (
              rate(grpc_server_request_duration_seconds_bucket[5m])))

  # -------------------------------------------------------------------------
  # Alerts.
  # -------------------------------------------------------------------------
  - name: lab-alerts
    interval: 30s
    rules:

      - alert: ServiceDown
        # `up` is synthesised by Prometheus per scrape, so this fires when a
        # service stops answering rather than when it reports being unwell.
        # That distinction matters: a process that has died reports nothing at
        # all, and a health-based alert would simply go quiet.
        expr: up{job="observability-lab-services"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} is not answering scrapes"
          description: "No successful scrape of {{ $labels.instance }} for a minute."

      - alert: HighHttpErrorRate
        # A ratio, not an absolute count: 10 errors per second is a catastrophe
        # at low traffic and noise at high traffic, and only the ratio means
        # the same thing at both.
        expr: |
          lab:http_error_rate:5m / lab:http_request_rate:5m > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} is failing more than 5% of requests"

      - alert: OutboxBacklogGrowing
        # The outbox is meant to drain within seconds. A sustained backlog means
        # the relay cannot reach Kafka, and every order accepted meanwhile is
        # one whose stock is never reserved.
        expr: lab_outbox_pending_events > 50
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Outbox backlog on {{ $labels.service }} is not draining"
          description: "{{ $value }} events are still owed to Kafka."

      - alert: OrdersAcceptedButNotSettled
        # The business signal with no technical equivalent. Every technical
        # metric can be green while orders pile up unsettled, because nothing
        # is failing - the answer simply never comes back.
        expr: |
          sum(rate(lab_orders_accepted_total[10m]))
            - sum(rate(lab_orders_settled_total[10m])) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Orders are being accepted faster than they are settled"

      - alert: DeadLetterMessages
        # Any dead letter is worth a look: by definition it exhausted its
        # retries, so nothing will pick it up automatically.
        expr: increase(lab_messages_dead_lettered_total[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} dead-lettered a message"

      - alert: DatabasePoolExhausted
        # Threads waiting on a connection is the shape almost every "the site
        # is slow" incident actually has.
        expr: hikaricp_connections_pending > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} has threads waiting for a database connection"

      # -----------------------------------------------------------------------
      # The gRPC hop. Four alerts, and each one describes a failure that the
      # HTTP alerts above cannot see.
      # -----------------------------------------------------------------------

      - alert: GrpcHighFaultRate
        # A ratio, and one built only from genuine faults. clamp_min keeps a
        # service with no traffic from dividing by zero and firing on nothing.
        expr: |
          lab:grpc_fault_rate:5m
            / clamp_min(lab:grpc_request_rate:5m, 0.001) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.grpc_service }} is faulting on more than 1% of calls"

      - alert: GrpcDeadlineExceededRising
        # The caller gave up. Either this service got slower or the deadline is
        # too tight - and the gap between the client and server duration panels
        # is what says which.
        expr: |
          sum by (service, grpc_method) (rate(grpc_server_requests_total{
            grpc_status="DEADLINE_EXCEEDED"}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.grpc_method }} is exceeding its callers' deadlines"

      - alert: GrpcExecutorSaturated
        # The failure with no other symptom: calls are slow, CPU is low, heap is
        # healthy and Tomcat's thread pool is empty - because the queue is in
        # front of a pool nothing else measures. gRPC dispatches onto its own
        # executor, and this is the only metric that shows it filling.
        expr: |
          executor_active_threads{name="grpc-executor"}
            / clamp_min(executor_pool_max_threads{name="grpc-executor"}, 1) > 0.9
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }}'s gRPC handler pool is saturated"
          description: "RPCs are queueing while every other saturation signal looks healthy."

      - alert: GrpcChannelNotReady
        # A client that cannot reach the provider at all, visible before any
        # user notices. Also the first thing to check when the caller reports
        # UNAVAILABLE while the callee's own dashboards are green.
        expr: grpc_client_channel_state{state="TRANSIENT_FAILURE"} == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} cannot reach {{ $labels.target }} over gRPC"

      - alert: GrpcCircuitBreakerOpen
        # A breaker that opens silently is worse than none: the dependency stops
        # being called and nothing says why.
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} has opened the circuit to {{ $labels.name }}"
