# ---------------------------------------------------------------------------
# Prometheus - scrapes every component that exposes metrics.
#
# Pull, not push, and that is the design rather than an implementation detail.
# Prometheus deciding when to scrape means a target that has stopped answering
# is *itself* a signal (`up == 0`); with a push model a silent target and a
# healthy-but-idle one are indistinguishable.
#
# Everything scraped here is also forwarded to VictoriaMetrics by remote_write
# at the bottom of this file, so the same samples land in two stores and can be
# compared from the same Grafana.
# ---------------------------------------------------------------------------

global:
  # 15s is the usual starting point: fine enough to see a spike inside a
  # one-minute alert window, coarse enough that the series count stays sane.
  scrape_interval: 15s
  evaluation_interval: 15s
  # Attached to every series leaving this Prometheus, which is what makes two
  # servers' data distinguishable once they are federated or remote-written
  # into the same place.
  external_labels:
    monitor: observability-lab
    source: prometheus

rule_files:
  - /etc/prometheus/rules/*.yml

# ---------------------------------------------------------------------------
# Where a firing rule goes.
#
# Prometheus decides *that* something is wrong and then hands it over. It has
# no concept of severity routing, grouping, inhibition or silences - all four
# live in Alertmanager, which is why the two are separate processes rather than
# one. Without this block the rules above evaluate correctly and notify nobody,
# which is what step 11 shipped and step 16 fixes.
# ---------------------------------------------------------------------------
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      # Every alert leaving this server is stamped with the external_labels
      # above, so Alertmanager can tell two Prometheus servers apart once there
      # is more than one.
      timeout: 10s

scrape_configs:

  # -------------------------------------------------------------------------
  # The Spring Boot services.
  #
  # Their compose names on lab-net. These were the host's address while the
  # services were processes on the developer's machine; containerising them made
  # this the only line here that had to change.
  #
  # Prometheus scrapes them DIRECTLY, never through Toxiproxy - the same rule
  # the exporters follow. A monitoring path that shared the application's
  # network path would break in the same way the application does, and most of
  # the value of a fault-injection lab is being able to see that a datastore is
  # fine while the path to it is not.
  #
  # Static targets rather than Consul service discovery: the two services are
  # known and fixed here, and a static list makes a missing target obvious
  # rather than silently absent. Swapping in consul_sd_config is a one-block
  # change when instances become dynamic.
  # -------------------------------------------------------------------------
  - job_name: observability-lab-services
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    # The services already stamp `service` onto every meter as a common tag
    # (MetricsAutoConfiguration). Without honor_labels Prometheus treats the
    # target label below as authoritative and renames the application's to
    # `exported_service` - leaving two labels with identical values and every
    # dashboard query having to guess which one is real.
    #
    # honor_labels lets the scraped value win where it exists, while the target
    # label still applies to synthesised series like `up`, which carry no labels
    # of their own and are exactly what the ServiceDown alert reads.
    honor_labels: true
    static_configs:
      - targets: ["order-service:8081"]
        labels:
          service: order-service
      - targets: ["inventory-service:8082"]
        labels:
          service: inventory-service
    relabel_configs:
      # `instance` defaults to the scrape address, which is an implementation
      # detail nobody wants on a dashboard legend.
      - source_labels: [__address__]
        target_label: instance
    metric_relabel_configs:
      # Drop the per-percentile series Micrometer would publish alongside the
      # histogram buckets. The buckets are the aggregatable form; keeping both
      # doubles the series count for no additional answer.
      - source_labels: [__name__]
        regex: '.*_percentile$'
        action: drop

  # -------------------------------------------------------------------------
  # Prometheus scrapes itself. Cheap, and it is how you find out that the
  # thing watching everything else has stopped.
  # -------------------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # -------------------------------------------------------------------------
  # Alertmanager. Scraped for the same reason Prometheus scrapes itself: the
  # component that delivers the alerts is a component that can fail, and its
  # failure is silent by nature - nothing is delivered, and nothing says so.
  # -------------------------------------------------------------------------
  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # -------------------------------------------------------------------------
  # Exporters (step 16).
  #
  # Each of these is a narrow bridge between the observability network and a
  # datastore, holding a read-only credential scoped to statistics. They exist
  # because four categories of required alert - host resources, both databases,
  # Redis and Kafka - have no series to fire on otherwise: the services export
  # only their own *client-side* view of each dependency.
  #
  # The `job` label is what the ExporterDown alert matches on, so these names
  # are part of the alerting contract rather than free-form.
  # -------------------------------------------------------------------------
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: oracle
    # Oracle answers more slowly than the rest and the custom metrics query V$
    # views on every scrape. A tighter interval would make the exporter part of
    # the load it is measuring.
    scrape_interval: 30s
    scrape_timeout: 20s
    static_configs:
      - targets: ["oracle-exporter:9161"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # -------------------------------------------------------------------------
  # Infrastructure that speaks Prometheus natively - no exporter needed.
  # -------------------------------------------------------------------------
  - job_name: victoriametrics
    static_configs:
      - targets: ["victoriametrics:8428"]

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]

  # The two log shippers. Scraped because `up == 0` here is the only external
  # signal that a pipeline has stopped - a log agent fails silently by
  # definition, since the evidence it would have shipped is the evidence that
  # it stopped.
  #
  # It matters more for Fluent Bit than for anything else in this file: its
  # image contains no shell and no HTTP client, so it carries no container
  # healthcheck at all and this job is its whole health signal. See the comment
  # on that service in docker-compose.observability.yml.
  - job_name: fluent-bit
    metrics_path: /api/v1/metrics/prometheus
    static_configs:
      - targets: ["fluent-bit:2020"]

  - job_name: promtail
    metrics_path: /metrics
    static_configs:
      - targets: ["promtail:9080"]

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]

  # -------------------------------------------------------------------------
  # Toxiproxy - the fault injection point.
  #
  # Scraped because a fault that was injected and a fault that occurred look
  # identical from every other signal in this stack. toxiproxy_proxy_received_bytes
  # and the per-proxy connection counters are the record of what the experiment
  # actually did, on the same time axis as its consequences - so an unexplained
  # latency spike can be attributed to a toxic still being active rather than
  # investigated as a real regression.
  # -------------------------------------------------------------------------
  - job_name: toxiproxy
    static_configs:
      - targets: ["toxiproxy:8474"]

  # Kong is deliberately absent. Its admin port serves no Prometheus endpoint
  # unless the `prometheus` plugin is enabled in kong.yml, so scraping it means
  # a gateway change. Gateway metrics belong with a revision of step 06, not
  # bolted on here where the job would simply show as down.
  #
  # k6 is absent for a different reason: it pushes rather than being pulled. A
  # load test is a process with a beginning and an end, so a scrape target that
  # exists only during a run would spend most of its life reported as down. It
  # remote-writes to /api/v1/write instead - which is what
  # --web.enable-remote-write-receiver on this server is for, alongside Tempo's
  # metrics generator.

# ---------------------------------------------------------------------------
# Long-term storage.
#
# VictoriaMetrics receives a copy of every sample. It stores the same data far
# more compactly and answers the same PromQL, which is exactly why both are
# here: the lab can compare them on identical input rather than on claims.
#
# Prometheus keeps a short local retention and remains the source for alerting;
# VictoriaMetrics is the one to query for anything older.
# ---------------------------------------------------------------------------
remote_write:
  - url: http://victoriametrics:8428/api/v1/write
    queue_config:
      # Bounded. An unbounded queue against a slow remote turns a storage
      # problem into a Prometheus memory problem.
      capacity: 10000
      max_samples_per_send: 2000
      max_shards: 4
