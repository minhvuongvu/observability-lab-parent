# ---------------------------------------------------------------------------
# Nginx main configuration.
#
# Logs are written to stdout/stderr in JSON. Two reasons: the container
# runtime owns log shipping rather than files accumulating inside the
# container, and the log pipeline in step 10 can ingest edge access logs
# without a parser written specially for nginx's default text format.
# ---------------------------------------------------------------------------

user  nginx;
worker_processes  auto;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Field names match the log schema used by the services, so an edge log
    # and an application log can be correlated on the same keys.
    log_format json_access escape=json
    '{'
      '"timestamp":"$time_iso8601",'
      '"level":"INFO",'
      '"service":"nginx",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"path":"$uri",'
      '"query":"$args",'
      '"status":$status,'
      '"bytes_sent":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_addr":"$upstream_addr",'
      '"upstream_status":"$upstream_status",'
      '"upstream_response_time":"$upstream_response_time",'
      '"referrer":"$http_referer",'
      '"user_agent":"$http_user_agent",'
      '"request_id":"$request_id",'
      '"correlation_id":"$http_x_correlation_id",'
      '"traceparent":"$http_traceparent"'
    '}';

    access_log  /dev/stdout  json_access;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # Do not advertise the version in responses or error pages.
    server_tokens   off;

    include /etc/nginx/conf.d/*.conf;
}
