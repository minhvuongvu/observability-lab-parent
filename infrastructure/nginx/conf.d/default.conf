# ---------------------------------------------------------------------------
# Default server.
#
# The proxy accepts traffic and reports its own health. It deliberately
# forwards nothing yet: the upstream to Kong, TLS termination and the security
# headers that go with it are added in step 06.
# ---------------------------------------------------------------------------

server {
    listen      80 default_server;
    server_name _;

    # Every request gets a request id, generated here if the client did not
    # supply one. The edge is the right place for this: it is the first hop
    # that sees the request, so nothing downstream has to invent an identity.
    set $correlation_id $http_x_correlation_id;
    if ($correlation_id = "") {
        set $correlation_id $request_id;
    }

    add_header X-Request-Id     $request_id     always;
    add_header X-Correlation-Id $correlation_id always;

    # Container healthcheck target. Excluded from the access log so the
    # liveness probe does not drown out real traffic.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        default_type application/json;
        return 404 '{"error":"NO_ROUTE","message":"No upstream route is configured at this edge yet."}\n';
    }
}
