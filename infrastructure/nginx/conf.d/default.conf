# ---------------------------------------------------------------------------
# Edge server.
#
# Nginx is the single network entry point and owns two things: the identity of
# a request, and the headers a client must not be able to set. Everything about
# API policy - routing, rate limiting, token verification - belongs to Kong,
# one hop further in. Keeping the split sharp is why there are two components
# rather than one doing both jobs badly.
#
# No TLS. Every port in this lab binds to 127.0.0.1, so terminating TLS here
# would encrypt a loopback hop and add certificate handling that obscures the
# gateway behaviour this step is about. A deployment reachable from anywhere
# else would terminate TLS at this block and redirect port 80 to it.
# ---------------------------------------------------------------------------

upstream kong_gateway {
    server kong:8000 max_fails=3 fail_timeout=10s;
    # Reuse connections to Kong. Without this every proxied request pays a TCP
    # handshake, which at the edge is the difference between a fast gateway and
    # a gateway that looks like the slow part of the system.
    keepalive 32;
    keepalive_timeout 60s;
}

server {
    listen      80 default_server;
    server_name _;

    # A request id per request, and a correlation id that survives across
    # several requests in one business transaction. The edge is the right place
    # to mint these: it is the first hop that sees the request, so nothing
    # downstream has to invent an identity or agree on who does.
    set $correlation_id $http_x_correlation_id;
    if ($correlation_id = "") {
        set $correlation_id $request_id;
    }

    # `always` so the headers are present on error responses too, which are
    # exactly the responses somebody will later quote in a support ticket.
    add_header X-Request-Id     $request_id     always;
    add_header X-Correlation-Id $correlation_id always;

    # Minimal, uncontroversial hardening. A JSON API is not a document site, so
    # there is no framing or sniffing use case to preserve.
    add_header X-Content-Type-Options nosniff  always;
    add_header X-Frame-Options        DENY     always;
    add_header Referrer-Policy        no-referrer always;

    # Bounded at the edge as well as at Kong: the outermost hop is the cheapest
    # place to refuse a body nobody downstream should have to buffer.
    client_max_body_size 1m;
    client_body_timeout  10s;
    client_header_timeout 10s;

    # Container healthcheck target. Excluded from the access log so the liveness
    # probe does not drown out real traffic.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://kong_gateway;

        # HTTP/1.1 with an empty Connection header is what actually enables the
        # keepalive pool above; the defaults would close every upstream socket.
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header X-Request-Id     $request_id;
        proxy_set_header X-Correlation-Id $correlation_id;

        # The services echo these back on their own responses. Without hiding
        # the upstream copies the client receives each header twice - identical
        # values, but a duplicated header is ambiguous to parse and invites a
        # client to trust whichever one it happens to read. The edge minted
        # them, so the edge is the single authority on their value.
        proxy_hide_header X-Request-Id;
        proxy_hide_header X-Correlation-Id;

        # Defence in depth. The services treat X-User-Id as the authenticated
        # subject, so a client must never be able to supply one. Kong removes it
        # as well; two independent removals mean a misconfiguration at either
        # layer is not a privilege escalation. An empty value removes the header
        # from the proxied request rather than forwarding a blank one.
        proxy_set_header X-User-Id "";

        proxy_connect_timeout 2s;
        proxy_send_timeout    20s;
        # Longer than Kong's own 15s read timeout, so a slow upstream is
        # reported by the component that knows why rather than cut off here.
        proxy_read_timeout    20s;

        # Only retry conditions that cannot have been acted on upstream. Adding
        # non_idempotent here would let a POST that timed out be replayed.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location / {
        default_type application/json;
        return 404 '{"error":"NO_ROUTE","message":"No route is configured for this path. The API is served under /api/."}\n';
    }
}
