# ---------------------------------------------------------------------------
# Redis configuration - policy only.
#
# The password is NOT here. It is passed as --requirepass on the command line
# from the environment, because a config file in version control must never
# carry a credential. CLI arguments override this file, so the two compose
# cleanly: policy here, secret in the environment.
# ---------------------------------------------------------------------------

# --- Network ---------------------------------------------------------------
bind 0.0.0.0
protected-mode yes
tcp-keepalive 300
timeout 0

# --- Memory and eviction ---------------------------------------------------
# A deliberately small ceiling. The lab is meant to reach this limit so that
# eviction is something you can watch happen rather than read about.
maxmemory 256mb
maxmemory-policy allkeys-lru

# --- Persistence -----------------------------------------------------------
dir /data
appendonly yes
appendfsync everysec
# RDB snapshots alongside the AOF: after N seconds if at least M keys changed.
save 900 1
save 300 10
save 60 10000

# --- Observability ---------------------------------------------------------
loglevel notice
# Commands slower than 10ms are recorded. SLOWLOG GET is the first place to
# look when cache latency shows up in a trace.
slowlog-log-slower-than 10000
slowlog-max-len 128
# Publish expiry and eviction events so TTL behaviour and cache pressure can
# be subscribed to rather than inferred:
#   Ex = expired events, Ee = evicted events
notify-keyspace-events Exe
# Track the slowest command families for INFO latencystats.
latency-monitor-threshold 100
