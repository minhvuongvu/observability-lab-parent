# ---------------------------------------------------------------------------
# Parsers for Fluent Bit.
#
# One parser, for the JSON the services write. It exists mainly to pull the
# timestamp out: without Time_Key, Fluent Bit stamps each record with the
# moment it read the line, so a backlog read after a restart arrives with every
# record at the same instant and the order of an incident is lost.
# ---------------------------------------------------------------------------

[PARSER]
    Name        lab_json
    Format      json
    Time_Key    @timestamp
    # Matches the logback-common.xml pattern exactly. A mismatch here is silent:
    # Fluent Bit falls back to ingestion time rather than failing.
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On
