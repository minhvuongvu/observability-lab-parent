# ---------------------------------------------------------------------------
# Fluent Bit - pipeline 2 of 3.
#
#     services -> JSON file -> Fluent Bit -> Loki
#
# Same source and same destination as Promtail, deliberately. The difference is
# the agent: Fluent Bit is written in C, uses a few megabytes of memory, and is
# the usual choice for a DaemonSet on every node of a cluster where Promtail's
# Go runtime would be multiplied by the node count.
#
# Records are labelled pipeline="fluent-bit" so the two paths are
# distinguishable in Loki rather than looking like duplicate ingestion.
# ---------------------------------------------------------------------------

[SERVICE]
    Flush         1
    Daemon        off
    Log_Level     warn
    Parsers_File  parsers.conf
    # Health endpoint so compose can tell whether it is actually running rather
    # than merely started.
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    # Buffer to disk, not only memory. Without this, a Loki outage longer than
    # the memory buffer silently drops records - which is the moment logs
    # matter most.
    storage.path              /var/lib/fluent-bit/storage
    storage.sync              normal
    storage.checksum          off
    storage.backlog.mem_limit 64M

[INPUT]
    Name              tail
    Tag               lab.*
    Path              /var/log/lab/*.json
    # Skip the rotated .gz files the appender leaves behind; re-ingesting them
    # would duplicate everything on every restart.
    Exclude_Path      /var/log/lab/*.gz
    Parser            lab_json
    # Where it left off, on a named volume so a restart resumes.
    DB                /var/lib/fluent-bit/tail.db
    Mem_Buf_Limit     32MB
    storage.type      filesystem
    Refresh_Interval  5
    Skip_Long_Lines   On

# Stamp the pipeline onto every record so Loki can tell the two paths apart.
[FILTER]
    Name    modify
    Match   lab.*
    Add     pipeline fluent-bit

# The tail plugin names records after the file they came from. Lifting the
# service name out of the path is not needed - the JSON already carries a
# "service" field - but the file name is a useful cross-check when the two
# disagree, which is how a misconfigured LOG_DIR gets noticed.
[FILTER]
    Name    record_modifier
    Match   lab.*
    Record  agent fluent-bit

[OUTPUT]
    Name                     loki
    Match                    lab.*
    Host                     loki
    Port                     3100
    # Only low-cardinality fields become labels, for the same reason as in
    # Promtail: a label per request id would create a Loki stream per request.
    # correlation_id and request_id stay in the line body, queryable with
    # LogQL's json filter.
    Labels                   job=fluent-bit
    Label_Keys               $service,$level,$environment,$pipeline
    # Use the application's own timestamp rather than ingestion time.
    Auto_Kubernetes_Labels   Off
    line_format              json
    Retry_Limit              5
