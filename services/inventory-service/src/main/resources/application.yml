# ---------------------------------------------------------------------------
# Inventory Service - base configuration
#
# Settings identical in every environment. Anything that varies belongs in
# application-{local,dev,prod}.yml, and anything secret comes from the
# environment (12-Factor config), never from this file.
#
# ./scripts/run-service.sh supplies the connection settings from
# docker/compose/.env, so a stack published on non-default ports still works.
# ---------------------------------------------------------------------------
spring:
  application:
    name: inventory-service
  profiles:
    default: local
  lifecycle:
    # Longer than the Order Service: a shutdown must let the consumer finish the
    # batch it has already polled, or those records are redelivered to whoever
    # takes over the partition.
    timeout-per-shutdown-phase: 45s
  jackson:
    default-property-inclusion: non_null

  security:
    oauth2:
      resourceserver:
        jwt:
          # Verification keys are fetched lazily from the realm's JWKS endpoint,
          # so the service starts even when Keycloak is not up yet. What is
          # actually asserted on every token - issuer and expiry - is validated
          # by the decoder configured from app.security.issuer-uri below.
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/observability/protocol/openid-connect/certs}

  config:
    # Pull configuration overrides from Consul KV before the context starts.
    # Optional, so the service still boots when Consul is absent (tests, or a
    # standalone run); when present, KV values take precedence over this file.
    # The Consul host/port are read from spring.cloud.consul below. See
    # docs/Consul.md.
    import: "optional:consul:"

  datasource:
    url: jdbc:oracle:thin:@//${ORACLE_DB_HOST:localhost}:${ORACLE_DB_PORT:1521}/${ORACLE_PDB:FREEPDB1}
    username: ${INVENTORY_DB_USER:inventory_user}
    password: ${INVENTORY_DB_PASSWORD:LocalDevInventory1}
    hikari:
      pool-name: inventory-db-pool
      maximum-pool-size: 10
      minimum-idle: 2
      # Longer than the Order Service's 3s: Oracle is measurably slower to
      # establish a connection, and a timeout tuned for PostgreSQL produces
      # spurious failures here.
      connection-timeout: 5000
      validation-timeout: 3000
      max-lifetime: 900000

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema; Hibernate only checks that it matches.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  cache:
    type: redis

  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        register: true
        deregister: true
        prefer-ip-address: false
        # The address Consul stores, health-checks back on, and hands to the Order
        # Service's Feign client and gRPC channel.
        #
        # The compose file sets this to `toxiproxy`, not to this service's own
        # name, so the service-to-service hop runs through the fault proxy and
        # latency or a connection reset can be injected into it at runtime. That
        # is what a service mesh sidecar does - an instance behind Envoy
        # advertises the sidecar, not itself - and it correctly means the health
        # check traverses the same path the callers do.
        #
        # The default below is the direct address, for a run without compose.
        # See docs/Consul.md and docs/Simulation.md.
        hostname: ${SERVICE_HOSTNAME:inventory-service}
        health-check-path: /actuator/health
        health-check-interval: 10s
        instance-id: ${spring.application.name}:${server.port}
        tags:
          - observability-lab
          # Advertises that this instance also serves gRPC. The Order Service's
          # name resolver filters on it, so an instance that has not been
          # upgraded yet is simply not offered as a gRPC target.
          - grpc
        metadata:
          # The gRPC port, published alongside the HTTP one. Consul registers a
          # single port per service, so the second one travels as metadata; the
          # HTTP health check on /actuator/health stays authoritative for both,
          # because a process that cannot serve HTTP cannot serve gRPC either.
          grpc-port: "${app.grpc.server.port}"
        # A registry that is briefly down must not stop the service from
        # starting; it registers as soon as Consul returns.
        fail-fast: false
      config:
        enabled: true
        # Consul unreachable at startup is not fatal: the service falls back to
        # its bundled application.yml. Pairs with the optional: config import.
        fail-fast: false
        # KV holds a YAML document under config/<context>/data rather than one
        # key per property, so an override reads like the file it overrides.
        format: yaml
        prefix: config
        default-context: application
        data-key: data
        watch:
          enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      # Named for what it does, per the platform convention
      # <service>-<topic>-group. The group id is the unit of offset tracking;
      # changing it silently replays the topic from auto-offset-reset.
      group-id: inventory-order-created-group
      # A new consumer group reads the topic from the beginning. For a stock
      # service that is the correct default: missing an order-created means
      # stock is never reserved, and there is nothing to reconcile against.
      auto-offset-reset: earliest
      # Offsets are committed by the container after a record is handled, not
      # on a timer. Auto-commit acknowledges records that may never be
      # processed if the service dies mid-batch.
      enable-auto-commit: false
      # Deserializers are set as instances in KafkaConsumerConfiguration.
      properties:
        # Generous: a slow Oracle write must not be mistaken for a dead consumer
        # and trigger a rebalance mid-batch.
        max.poll.interval.ms: 300000
        isolation.level: read_committed
      max-poll-records: 50
    producer:
      # Serializers are set as instances in KafkaProducerConfiguration.
      # Durability over throughput: a settlement that is acknowledged and then
      # lost leaves an order PENDING with its stock reserved.
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 30000
        request.timeout.ms: 10000
    listener:
      # Commit the offset after each record, so a crash replays at most one.
      ack-mode: record
      # One thread per partition of order-created. More would idle; fewer would
      # leave partitions unattended while others queue.
      concurrency: 3

server:
  port: 8082
  shutdown: graceful

  # Tomcat's own MBeans, which Spring Boot leaves unregistered by default.
  # Without this the tomcat_threads_* meters do not exist at all - and the
  # TomcatThreadPoolSaturated alert (step 16) is not "quiet", it is unable to
  # fire. Thread exhaustion is a failure whose whole signature is that CPU,
  # heap and the database all look healthy, so it is the last one to leave
  # unmeasured.
  tomcat:
    mbeanregistry:
      enabled: true

# Service identity. Stamped onto every log line, metric tag and span attribute.
app:
  name: ${spring.application.name}
  version: @project.version@
  environment: local

  logging:
    # Where the JSON log file is written. Set to /var/log/lab in the container,
    # which is the lab-logs volume that Promtail, Fluent Bit and Fluentd all
    # mount read-only - so it has to be a path both they and the service can see.
    # A run through ./scripts/run-service.sh writes to <repo>/logs instead, and
    # those lines are therefore NOT shipped anywhere. See docs/Logging.md.
    directory: ${LOG_DIR:logs}

  security:
    # Issuer every token must carry; verified on every request. Kong enforces
    # the same issuer at the edge (infrastructure/kong/kong.yml), so a token is
    # checked against it twice - once at the gateway, once here.
    issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8080/realms/observability}

  kafka:
    topics:
      order-created: order-created
      inventory-updated: inventory-updated
      # Records that exhausted their retries. Inspected by a human, never
      # consumed automatically - a poison message replayed on a loop is how a
      # dead letter queue becomes an outage.
      dead-letter: dead-letter-topic

  cache:
    # Shorter than the Order Service's: stock changes far more often than an
    # order does, and a stale availability figure is the one that oversells.
    stock-ttl: 2m

  grpc:
    server:
      # 90xx mirrors the 80xx HTTP port, so the pairing is obvious at a glance.
      port: ${GRPC_PORT:9082}
      # Loopback by default. gRPC here is service-to-service and is deliberately
      # NOT routed through Kong: the gateway's plugin stack is HTTP-native, and
      # exposing an internal contract at the edge is how it stops being internal.
      #
      # ./scripts/run-service.sh widens this to 0.0.0.0, because the instance
      # registers a LAN address in Consul and the Order Service connects to what
      # the registry hands it. Binding loopback while advertising a routable
      # address registers an endpoint nothing can reach. That widening is why
      # the port authenticates as well (below): the network is not the control.
      bind-address: ${GRPC_BIND_ADDRESS:127.0.0.1}
      # gRPC dispatches onto its own executor, separate from Tomcat's. The queue
      # is bounded so overload surfaces as RESOURCE_EXHAUSTED - retryable, and
      # visible - rather than as unbounded latency and eventually a heap dump.
      executor-threads: 16
      executor-queue-capacity: 256
      shutdown-grace: 20s
      # The default. A batch of 100 SKUs is kilobytes; a larger ceiling is a
      # memory-exhaustion vector, not a feature.
      max-inbound-message-size: 4194304
      # Serves the schema to grpcurl without a copy of the .proto. Overridden to
      # false under prod in application-prod.yml: reflection publishes the full
      # service schema to anyone who can reach the port.
      reflection-enabled: true
      authentication:
        # The same JwtDecoder the HTTP resource server uses, applied to the gRPC
        # port. The port is on loopback, which is a real control - and exactly
        # the kind that stops being true the first time this is containerised.
        enabled: true

# Surfaced at /actuator/info (management.info.env.enabled below). The default
# names this file; a value seeded into Consul KV (config/application/data)
# overrides it - the visible proof that externalised configuration is read.
info:
  platform:
    config-source: "application.yml default (Consul KV not applied)"

management:
  endpoints:
    web:
      exposure:
        # Deliberately narrow: named endpoints, never `*`. Actuator exposes
        # heapdump, env and configprops among others, and any of those on an
        # open port is a credential leak rather than an observability feature.
        include: health,info,metrics,prometheus
  # Metrics. Common tags (service, environment, version) and the latency
  # histograms are applied by the shared library's MetricsAutoConfiguration, so
  # every service tags identically without having to remember to.
  metrics:
    distribution:
      # Server-side percentiles from bucket counts, not client-side
      # pre-computed ones: a pre-computed 99th percentile cannot be aggregated
      # across instances, so it becomes meaningless the moment this scales out.
      percentiles-histogram:
        http.server.requests: true
      # SLO boundaries get their own buckets, so "what fraction of requests were
      # under 500ms" is an exact bucket ratio rather than an interpolation.
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2s
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState, db, redis
  # The registry's own reachability must not drag down this service's health: if
  # it did, Consul health-checking /actuator/health would couple each service to
  # the very component doing the checking.
  health:
    consul:
      enabled: false
  info:
    env:
      enabled: true

# Levels only. Where the logs go and what shape they take is logback-spring.xml's
# job; Boot applies these after that file is parsed, so this is the one place a
# level can be changed without the two disagreeing. See docs/Logging.md.
logging:
  level:
    root: INFO
    com.observability.lab: INFO
    # The Kafka client logs its entire resolved configuration at INFO on every
    # partition assignment - hundreds of lines per rebalance, none of it about
    # this service.
    org.apache.kafka.clients: WARN
    org.apache.kafka.common.metrics: WARN
    org.springframework.kafka: INFO
