# ---------------------------------------------------------------------------
# Inventory Service - base configuration
#
# Settings identical in every environment. Anything that varies belongs in
# application-{local,dev,prod}.yml, and anything secret comes from the
# environment (12-Factor config), never from this file.
#
# ./scripts/run-service.sh supplies the connection settings from
# docker/compose/.env, so a stack published on non-default ports still works.
# ---------------------------------------------------------------------------
spring:
  application:
    name: inventory-service
  profiles:
    default: local
  lifecycle:
    # Longer than the Order Service: a shutdown must let the consumer finish the
    # batch it has already polled, or those records are redelivered to whoever
    # takes over the partition.
    timeout-per-shutdown-phase: 45s
  jackson:
    default-property-inclusion: non_null

  security:
    oauth2:
      resourceserver:
        jwt:
          # Verification keys are fetched lazily from the realm's JWKS endpoint,
          # so the service starts even when Keycloak is not up yet. What is
          # actually asserted on every token - issuer and expiry - is validated
          # by the decoder configured from app.security.issuer-uri below.
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/observability/protocol/openid-connect/certs}

  config:
    # Pull configuration overrides from Consul KV before the context starts.
    # Optional, so the service still boots when Consul is absent (tests, or a
    # standalone run); when present, KV values take precedence over this file.
    # The Consul host/port are read from spring.cloud.consul below. See
    # docs/Consul.md.
    import: "optional:consul:"

  datasource:
    url: jdbc:oracle:thin:@//${ORACLE_DB_HOST:localhost}:${ORACLE_DB_PORT:1521}/${ORACLE_PDB:FREEPDB1}
    username: ${INVENTORY_DB_USER:inventory_user}
    password: ${INVENTORY_DB_PASSWORD:LocalDevInventory1}
    hikari:
      pool-name: inventory-db-pool
      maximum-pool-size: 10
      minimum-idle: 2
      # Longer than the Order Service's 3s: Oracle is measurably slower to
      # establish a connection, and a timeout tuned for PostgreSQL produces
      # spurious failures here.
      connection-timeout: 5000
      validation-timeout: 3000
      max-lifetime: 900000

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema; Hibernate only checks that it matches.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  cache:
    type: redis

  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        register: true
        deregister: true
        prefer-ip-address: false
        # The address Consul stores and health-checks back on. This service runs
        # on the host while Consul runs in a container, so it advertises the same
        # host.docker.internal the gateway resolves to. It becomes the compose
        # service name once the service itself is containerised.
        hostname: ${SERVICE_HOSTNAME:host.docker.internal}
        health-check-path: /actuator/health
        health-check-interval: 10s
        instance-id: ${spring.application.name}:${server.port}
        tags:
          - observability-lab
        # A registry that is briefly down must not stop the service from
        # starting; it registers as soon as Consul returns.
        fail-fast: false
      config:
        enabled: true
        # Consul unreachable at startup is not fatal: the service falls back to
        # its bundled application.yml. Pairs with the optional: config import.
        fail-fast: false
        # KV holds a YAML document under config/<context>/data rather than one
        # key per property, so an override reads like the file it overrides.
        format: yaml
        prefix: config
        default-context: application
        data-key: data
        watch:
          enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      # Named for what it does, per the platform convention
      # <service>-<topic>-group. The group id is the unit of offset tracking;
      # changing it silently replays the topic from auto-offset-reset.
      group-id: inventory-order-created-group
      # A new consumer group reads the topic from the beginning. For a stock
      # service that is the correct default: missing an order-created means
      # stock is never reserved, and there is nothing to reconcile against.
      auto-offset-reset: earliest
      # Offsets are committed by the container after a record is handled, not
      # on a timer. Auto-commit acknowledges records that may never be
      # processed if the service dies mid-batch.
      enable-auto-commit: false
      # Deserializers are set as instances in KafkaConsumerConfiguration.
      properties:
        # Generous: a slow Oracle write must not be mistaken for a dead consumer
        # and trigger a rebalance mid-batch.
        max.poll.interval.ms: 300000
        isolation.level: read_committed
      max-poll-records: 50
    producer:
      # Serializers are set as instances in KafkaProducerConfiguration.
      # Durability over throughput: a settlement that is acknowledged and then
      # lost leaves an order PENDING with its stock reserved.
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 30000
        request.timeout.ms: 10000
    listener:
      # Commit the offset after each record, so a crash replays at most one.
      ack-mode: record
      # One thread per partition of order-created. More would idle; fewer would
      # leave partitions unattended while others queue.
      concurrency: 3

server:
  port: 8082
  shutdown: graceful

# Service identity. Stamped onto every log line, metric tag and span attribute.
app:
  name: ${spring.application.name}
  version: @project.version@
  environment: local

  security:
    # Issuer every token must carry; verified on every request. Kong enforces
    # the same issuer at the edge (infrastructure/kong/kong.yml), so a token is
    # checked against it twice - once at the gateway, once here.
    issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8080/realms/observability}

  kafka:
    topics:
      order-created: order-created
      inventory-updated: inventory-updated
      # Records that exhausted their retries. Inspected by a human, never
      # consumed automatically - a poison message replayed on a loop is how a
      # dead letter queue becomes an outage.
      dead-letter: dead-letter-topic

  cache:
    # Shorter than the Order Service's: stock changes far more often than an
    # order does, and a stale availability figure is the one that oversells.
    stock-ttl: 2m

# Surfaced at /actuator/info (management.info.env.enabled below). The default
# names this file; a value seeded into Consul KV (config/application/data)
# overrides it - the visible proof that externalised configuration is read.
info:
  platform:
    config-source: "application.yml default (Consul KV not applied)"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState, db, redis
  # The registry's own reachability must not drag down this service's health: if
  # it did, Consul health-checking /actuator/health would couple each service to
  # the very component doing the checking.
  health:
    consul:
      enabled: false
  info:
    env:
      enabled: true

logging:
  level:
    root: INFO
    com.observability.lab: INFO
