# Prod profile: conservative defaults.
# Nothing that leaks internals to a caller, nothing that floods the log pipeline.
spring:
  main:
    banner-mode: "off"
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

app:
  environment: prod

  # Failure simulation is off, and stated explicitly rather than left to the
  # profile guard in ChaosAutoConfiguration.
  #
  # Two independent switches for one feature is not redundancy for its own sake.
  # The profile guard is a Java annotation that a refactor can widen by accident;
  # this line is in the file an operator reads when asking "can this environment
  # be made to deadlock itself remotely". Both must say no.
  chaos:
    enabled: false
  grpc:
    server:
      # Server reflection publishes the full service schema - every method, every
      # message, every field - to anyone who can reach the port. That is free
      # reconnaissance, and the .proto is in the repository for anyone entitled
      # to it.
      reflection-enabled: false

server:
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoint:
    health:
      # Component detail names internal hosts and dependency topology.
      show-details: never

logging:
  level:
    root: WARN
    com.observability.lab: INFO
