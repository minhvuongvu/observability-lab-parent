# ---------------------------------------------------------------------------
# Order Service - base configuration
#
# Settings identical in every environment. Anything that varies belongs in
# application-{local,dev,prod}.yml, and anything secret comes from the
# environment (12-Factor config), never from this file.
#
# Connection settings use ${VAR:default} so the defaults describe a standard
# local stack while any machine can override them without editing tracked
# files. ./scripts/run-service.sh supplies them from docker/compose/.env.
# ---------------------------------------------------------------------------
spring:
  application:
    name: order-service
  profiles:
    default: local
  lifecycle:
    # Grace period the container gets to drain in-flight requests before exit.
    timeout-per-shutdown-phase: 30s
  jackson:
    default-property-inclusion: non_null

  security:
    oauth2:
      resourceserver:
        jwt:
          # Verification keys are fetched lazily from the realm's JWKS endpoint,
          # so the service starts even when Keycloak is not up yet. What is
          # actually asserted on every token - issuer and expiry - is validated
          # by the decoder configured from app.security.issuer-uri below.
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/observability/protocol/openid-connect/certs}

  config:
    # Pull configuration overrides from Consul KV before the context starts.
    # Optional, so the service still boots when Consul is absent (tests, or a
    # standalone run); when present, KV values take precedence over this file.
    # The Consul host/port are read from spring.cloud.consul below. See
    # docs/Consul.md.
    import: "optional:consul:"

  datasource:
    url: jdbc:postgresql://${ORDER_DB_HOST:localhost}:${ORDER_DB_PORT:5432}/${ORDER_DB_NAME:orderdb}
    username: ${ORDER_DB_USER:order_user}
    password: ${ORDER_DB_PASSWORD:localdev_order_pw}
    hikari:
      pool-name: order-db-pool
      maximum-pool-size: 10
      minimum-idle: 2
      # Fail fast rather than piling up threads behind an unreachable database.
      connection-timeout: 3000
      validation-timeout: 2000
      max-lifetime: 900000

  jpa:
    # Off deliberately. Leaving the session open for the view layer hides lazy
    # loading behind the rendering step, where the resulting N+1 queries are
    # invisible to the service that caused them.
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Hibernate only checks that it matches, so drift
      # between entities and migrations becomes a startup failure.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # No baselining: an existing database without a Flyway history is a
    # situation that needs a human, not a silent assumption.
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s
    web:
      pageable:
        default-page-size: 20
        # A ceiling on what a caller may ask for. Without it, size=1000000 is a
        # single request that loads the whole table into memory.
        max-page-size: 100

  cache:
    type: redis

  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        register: true
        deregister: true
        prefer-ip-address: false
        # The address Consul stores and health-checks back on. This service runs
        # on the host while Consul runs in a container, so it advertises the same
        # host.docker.internal the gateway resolves to. It becomes the compose
        # service name once the service itself is containerised.
        hostname: ${SERVICE_HOSTNAME:host.docker.internal}
        health-check-path: /actuator/health
        health-check-interval: 10s
        # Only instances whose health check is passing are returned to the load
        # balancer. Without this the catalog hands back every registered
        # instance including the ones Consul already knows are failing, which
        # makes the health check decorative.
        query-passing: true
        instance-id: ${spring.application.name}:${server.port}
        tags:
          - observability-lab
        # A registry that is briefly down must not stop the service from
        # starting; it registers as soon as Consul returns.
        fail-fast: false
      config:
        enabled: true
        # Consul unreachable at startup is not fatal: the service falls back to
        # its bundled application.yml. Pairs with the optional: config import.
        fail-fast: false
        # KV holds a YAML document under config/<context>/data rather than one
        # key per property, so an override reads like the file it overrides.
        format: yaml
        prefix: config
        default-context: application
        data-key: data
        watch:
          enabled: true
    openfeign:
      client:
        config:
          inventory-service:
            # Deliberately shorter than this service's own request budget, so a
            # slow dependency surfaces as a 504 here rather than as a timeout
            # experienced by our caller.
            connect-timeout: 2000
            read-timeout: 5000
            logger-level: basic

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      # Platform convention <service>-<topic>-group. The group id is the unit of
      # offset tracking; changing it silently replays from auto-offset-reset.
      group-id: order-inventory-updated-group
      # A settlement this service never saw would leave an order PENDING
      # forever, so a new group reads the topic from the beginning.
      auto-offset-reset: earliest
      # Offsets are committed by the container after a record is handled, not on
      # a timer, so a crash cannot acknowledge unprocessed records.
      enable-auto-commit: false
      # Deserializers are set as instances in KafkaConsumerConfiguration.
      properties:
        isolation.level: read_committed
      max-poll-records: 50
    listener:
      # Commit after each record, so a crash replays at most one.
      ack-mode: record
      # One thread per partition of inventory-updated.
      concurrency: 3
    producer:
      # Serializers are set as instances in KafkaConfiguration, not by class name
      # here: naming the class lets Kafka build it with a private ObjectMapper
      # that renders Instant as an epoch decimal, disagreeing with the HTTP API.
      # Durability over throughput: an order event that is acknowledged and then
      # lost leaves stock unreserved with nothing to reconcile against.
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 30000
        request.timeout.ms: 10000

server:
  port: 8081
  shutdown: graceful

# Service identity. Stamped onto every log line, metric tag and span attribute.
app:
  name: ${spring.application.name}
  version: @project.version@
  environment: local

  security:
    # Issuer every token must carry; verified on every request. Kong enforces
    # the same issuer at the edge (infrastructure/kong/kong.yml), so a token is
    # checked against it twice - once at the gateway, once here.
    issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8080/realms/observability}

  kafka:
    topics:
      order-created: order-created
      inventory-updated: inventory-updated
      # Settlements that exhausted their retries. Inspected by a human, never
      # consumed automatically - a poison message replayed on a loop is how a
      # dead letter queue becomes an outage.
      dead-letter: dead-letter-topic

  outbox:
    # Small enough that one run is quick and the row locks are held briefly,
    # large enough to drain a burst in a few passes.
    batch-size: 100
    poll-interval: 1s
    # Delivered rows are history. Kept long enough to answer "was this sent?"
    # after an incident, then pruned so the table stays proportional to traffic
    # rather than to uptime.
    retention: 24h
    cleanup-interval: 1h

  cache:
    # Short enough that a stale order is a minor annoyance rather than a
    # correctness problem, long enough to absorb a read-heavy burst.
    orders-ttl: 10m

  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      # The least-privilege bucket user provisioned by minio-init, never the
      # MinIO root account. Secrets come from the environment, not from here.
      access-key: ${MINIO_ACCESS_KEY:lab-invoice-app}
      secret-key: ${MINIO_SECRET_KEY:localdev_minio_app_pw}
      bucket: ${MINIO_INVOICE_BUCKET:invoices}

  invoice:
    # Long enough for a person to follow the link, short enough that a URL
    # leaked through a log or a referrer header stops working quickly.
    url-validity: 15m

  clients:
    inventory:
      # No URL. The Feign client names 'inventory-service' and Spring Cloud
      # LoadBalancer resolves it through the Consul registry, so instances can
      # move or scale without a change here. Timeouts live under
      # spring.cloud.openfeign above, which is where Feign reads them from
      # without a custom Options bean.
      service-id: inventory-service

# Surfaced at /actuator/info (management.info.env.enabled below). The default
# names this file; a value seeded into Consul KV (config/application/data)
# overrides it - the visible proof that externalised configuration is read.
info:
  platform:
    config-source: "application.yml default (Consul KV not applied)"

management:
  endpoints:
    web:
      exposure:
        # Deliberately narrow. Prometheus scraping arrives with the metrics step.
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        # Liveness answers "should this container be restarted"; a failing
        # dependency is not a reason to restart, so it is not included here.
        liveness:
          include: livenessState
        # Readiness answers "should traffic be routed here", which a failing
        # database or cache genuinely does change.
        readiness:
          include: readinessState, db, redis
  # The registry's own reachability must not drag down this service's health: if
  # it did, Consul health-checking /actuator/health would couple each service to
  # the very component doing the checking.
  health:
    consul:
      enabled: false
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.observability.lab: INFO
