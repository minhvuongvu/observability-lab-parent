# ---------------------------------------------------------------------------
# Order Service - base configuration
#
# Settings identical in every environment. Anything that varies belongs in
# application-{local,dev,prod}.yml, and anything secret comes from the
# environment (12-Factor config), never from this file.
#
# Connection settings use ${VAR:default} so the defaults describe a standard
# local stack while any machine can override them without editing tracked
# files. ./scripts/run-service.sh supplies them from docker/compose/.env.
# ---------------------------------------------------------------------------
spring:
  application:
    name: order-service
  profiles:
    default: local
  lifecycle:
    # Grace period the container gets to drain in-flight requests before exit.
    timeout-per-shutdown-phase: 30s
  jackson:
    default-property-inclusion: non_null

  security:
    oauth2:
      resourceserver:
        jwt:
          # Verification keys are fetched lazily from the realm's JWKS endpoint,
          # so the service starts even when Keycloak is not up yet. What is
          # actually asserted on every token - issuer and expiry - is validated
          # by the decoder configured from app.security.issuer-uri below.
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/observability/protocol/openid-connect/certs}

  config:
    # Pull configuration overrides from Consul KV before the context starts.
    # Optional, so the service still boots when Consul is absent (tests, or a
    # standalone run); when present, KV values take precedence over this file.
    # The Consul host/port are read from spring.cloud.consul below. See
    # docs/Consul.md.
    import: "optional:consul:"

  datasource:
    url: jdbc:postgresql://${ORDER_DB_HOST:localhost}:${ORDER_DB_PORT:5432}/${ORDER_DB_NAME:orderdb}
    username: ${ORDER_DB_USER:order_user}
    password: ${ORDER_DB_PASSWORD:localdev_order_pw}
    hikari:
      pool-name: order-db-pool
      maximum-pool-size: 10
      minimum-idle: 2
      # Fail fast rather than piling up threads behind an unreachable database.
      connection-timeout: 3000
      validation-timeout: 2000
      max-lifetime: 900000

  jpa:
    # Off deliberately. Leaving the session open for the view layer hides lazy
    # loading behind the rendering step, where the resulting N+1 queries are
    # invisible to the service that caused them.
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Hibernate only checks that it matches, so drift
      # between entities and migrations becomes a startup failure.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # No baselining: an existing database without a Flyway history is a
    # situation that needs a human, not a silent assumption.
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s
    web:
      pageable:
        default-page-size: 20
        # A ceiling on what a caller may ask for. Without it, size=1000000 is a
        # single request that loads the whole table into memory.
        max-page-size: 100

  cache:
    type: redis

  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        register: true
        deregister: true
        prefer-ip-address: false
        # The address Consul stores, health-checks back on, and hands to anything
        # resolving this service. Its own compose name on lab-net, where every
        # component of the lab now runs - so one address satisfies both the
        # registry checking it and the callers connecting to it.
        #
        # It was host.docker.internal while this ran as a process on the
        # developer's machine, which satisfied only the registry: the name does
        # not resolve on the host, so callers were handed something they could
        # not reach. See docs/Consul.md.
        hostname: ${SERVICE_HOSTNAME:order-service}
        health-check-path: /actuator/health
        health-check-interval: 10s
        # Only instances whose health check is passing are returned to the load
        # balancer. Without this the catalog hands back every registered
        # instance including the ones Consul already knows are failing, which
        # makes the health check decorative.
        query-passing: true
        instance-id: ${spring.application.name}:${server.port}
        tags:
          - observability-lab
        # A registry that is briefly down must not stop the service from
        # starting; it registers as soon as Consul returns.
        fail-fast: false
      config:
        enabled: true
        # Consul unreachable at startup is not fatal: the service falls back to
        # its bundled application.yml. Pairs with the optional: config import.
        fail-fast: false
        # KV holds a YAML document under config/<context>/data rather than one
        # key per property, so an override reads like the file it overrides.
        format: yaml
        prefix: config
        default-context: application
        data-key: data
        watch:
          enabled: true
    openfeign:
      client:
        config:
          inventory-service:
            # Deliberately shorter than this service's own request budget, so a
            # slow dependency surfaces as a 504 here rather than as a timeout
            # experienced by our caller.
            connect-timeout: 2000
            read-timeout: 5000
            logger-level: basic

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      # Platform convention <service>-<topic>-group. The group id is the unit of
      # offset tracking; changing it silently replays from auto-offset-reset.
      group-id: order-inventory-updated-group
      # A settlement this service never saw would leave an order PENDING
      # forever, so a new group reads the topic from the beginning.
      auto-offset-reset: earliest
      # Offsets are committed by the container after a record is handled, not on
      # a timer, so a crash cannot acknowledge unprocessed records.
      enable-auto-commit: false
      # Deserializers are set as instances in KafkaConsumerConfiguration.
      properties:
        isolation.level: read_committed
      max-poll-records: 50
    listener:
      # Commit after each record, so a crash replays at most one.
      ack-mode: record
      # One thread per partition of inventory-updated.
      concurrency: 3
    producer:
      # Serializers are set as instances in KafkaConfiguration, not by class name
      # here: naming the class lets Kafka build it with a private ObjectMapper
      # that renders Instant as an epoch decimal, disagreeing with the HTTP API.
      # Durability over throughput: an order event that is acknowledged and then
      # lost leaves stock unreserved with nothing to reconcile against.
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 30000
        request.timeout.ms: 10000

server:
  port: 8081
  shutdown: graceful

  # Tomcat's own MBeans, which Spring Boot leaves unregistered by default.
  # Without this the tomcat_threads_* meters do not exist at all - and the
  # TomcatThreadPoolSaturated alert (step 16) is not "quiet", it is unable to
  # fire. Thread exhaustion is a failure whose whole signature is that CPU,
  # heap and the database all look healthy, so it is the last one to leave
  # unmeasured.
  tomcat:
    mbeanregistry:
      enabled: true

# Service identity. Stamped onto every log line, metric tag and span attribute.
app:
  name: ${spring.application.name}
  version: @project.version@
  environment: local

  logging:
    # Where the JSON log file is written. Set to /var/log/lab in the container,
    # which is the lab-logs volume that Promtail, Fluent Bit and Fluentd all
    # mount read-only - so it has to be a path both they and the service can see.
    # A run through ./scripts/run-service.sh writes to <repo>/logs instead, and
    # those lines are therefore NOT shipped anywhere. See docs/Logging.md.
    directory: ${LOG_DIR:logs}

  security:
    # Issuer every token must carry; verified on every request. Kong enforces
    # the same issuer at the edge (infrastructure/kong/kong.yml), so a token is
    # checked against it twice - once at the gateway, once here.
    issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8080/realms/observability}

  kafka:
    topics:
      order-created: order-created
      inventory-updated: inventory-updated
      # Settlements that exhausted their retries. Inspected by a human, never
      # consumed automatically - a poison message replayed on a loop is how a
      # dead letter queue becomes an outage.
      dead-letter: dead-letter-topic

  outbox:
    # Small enough that one run is quick and the row locks are held briefly,
    # large enough to drain a burst in a few passes.
    batch-size: 100
    poll-interval: 1s
    # Delivered rows are history. Kept long enough to answer "was this sent?"
    # after an incident, then pruned so the table stays proportional to traffic
    # rather than to uptime.
    retention: 24h
    cleanup-interval: 1h

  cache:
    # Short enough that a stale order is a minor annoyance rather than a
    # correctness problem, long enough to absorb a read-heavy burst.
    orders-ttl: 10m

  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      # The least-privilege bucket user provisioned by minio-init, never the
      # MinIO root account. Secrets come from the environment, not from here.
      access-key: ${MINIO_ACCESS_KEY:lab-invoice-app}
      secret-key: ${MINIO_SECRET_KEY:localdev_minio_app_pw}
      bucket: ${MINIO_INVOICE_BUCKET:invoices}

  # Failure simulation (step 17). Deliberate faults, for observability learning.
  #
  # The endpoints exist only under the local and dev profiles - see
  # ChaosAutoConfiguration - so this flag is a second switch rather than the
  # only one. It is here so a shared dev environment can turn the feature off
  # without a rebuild, which matters the first time a colleague deadlocks it.
  #
  # Every ceiling below is a bound on what a caller may ask for, not a default.
  # They exist because these faults are indistinguishable from a defect once
  # running: an unbounded memory leak is an OOM kill that takes the JVM with it
  # before anyone reads the flame graph it was supposed to produce.
  chaos:
    enabled: true
    # Every toggle expires on its own, so "forgot to reset" is a lab that
    # recovers by itself rather than a debugging session three days later.
    default-ttl: 5m
    max-ttl: 30m
    max-latency: 30s
    max-cpu-threads: 8
    max-cpu-duration: 2m
    max-memory-leak-mb: 512
    max-log-burst-lines: 100000
    max-payload-kb: 65536
    max-traffic-requests: 10000

  invoice:
    # Long enough for a person to follow the link, short enough that a URL
    # leaked through a log or a referrer header stops working quickly.
    url-validity: 15m

  clients:
    inventory:
      # No URL. The Feign client names 'inventory-service' and Spring Cloud
      # LoadBalancer resolves it through the Consul registry, so instances can
      # move or scale without a change here. Timeouts live under
      # spring.cloud.openfeign above, which is where Feign reads them from
      # without a custom Options bean.
      service-id: inventory-service

  grpc:
    client:
      inventory:
        # Resolved through Consul, exactly like the Feign client - but balanced
        # by the channel itself rather than by Spring Cloud LoadBalancer. A gRPC
        # channel multiplexes every RPC over one long-lived HTTP/2 connection,
        # so anything balancing at layer 4 pins all traffic to one instance.
        service-id: inventory-service
        enabled: true
        # The synchronous reservation attempt that races the Kafka path. Off
        # leaves every order PENDING until Kafka settles it, which is what the
        # system did before this step and is still the invariant.
        express-reservation: true

        # Deadlines, per operation. The rule: a callee's budget must be smaller
        # than its caller's, or the callee's timeout never fires and the caller
        # times out first - losing the more specific error.
        #
        #   client HTTP budget        3000ms
        #     order handler           1000ms
        #       gRPC BatchCheckStock   300ms   <- here
        #         Oracle query         250ms
        check-stock-deadline: 200ms
        batch-check-deadline: 300ms
        # Deliberately tight: this is an optimisation, and missing it costs
        # nothing but a fall-through to PENDING.
        reserve-stock-deadline: 200ms

        # Channel tuning. Keepalive detects a silently dead peer; without it a
        # half-open connection is discovered only when an RPC hangs to its
        # deadline.
        keep-alive-time: 30s
        keep-alive-timeout: 10s
        idle-timeout: 5m
        max-inbound-message-size: 4194304
        resolver-refresh: 10s

        # Two retries. Beyond that the deadline expires anyway and the extra
        # attempts land on a dependency that is already struggling.
        max-retry-attempts: 3
        # Retries may not exceed this share of traffic. Without a budget, a
        # per-attempt policy still permits 3x amplification during a partial
        # outage - which is the most common way a retry policy causes the very
        # outage it was defending against.
        retry-budget-ratio: 0.2

        circuit-breaker:
          sliding-window-size: 20
          failure-rate-threshold: 50
          # Trips on slowness as well as on errors. A dependency answering every
          # call in five seconds is as damaging as one returning errors, and a
          # pure error-rate breaker never notices.
          slow-call-rate-threshold: 80
          slow-call-duration: 250ms
          # Long enough to let a restart complete.
          open-duration: 10s
          half-open-calls: 3

# Surfaced at /actuator/info (management.info.env.enabled below). The default
# names this file; a value seeded into Consul KV (config/application/data)
# overrides it - the visible proof that externalised configuration is read.
info:
  platform:
    config-source: "application.yml default (Consul KV not applied)"

management:
  endpoints:
    web:
      exposure:
        # Deliberately narrow: named endpoints, never `*`. Actuator exposes
        # heapdump, env and configprops among others, and any of those on an
        # open port is a credential leak rather than an observability feature.
        include: health,info,metrics,prometheus
  # Metrics. Common tags (service, environment, version) and the latency
  # histograms are applied by the shared library's MetricsAutoConfiguration, so
  # every service tags identically without having to remember to.
  metrics:
    distribution:
      # Server-side percentiles from bucket counts, not client-side
      # pre-computed ones: a pre-computed 99th percentile cannot be aggregated
      # across instances, so it becomes meaningless the moment this scales out.
      percentiles-histogram:
        http.server.requests: true
      # SLO boundaries get their own buckets, so "what fraction of requests
      # were under 500ms" is an exact bucket ratio rather than an interpolation.
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2s
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        # Liveness answers "should this container be restarted"; a failing
        # dependency is not a reason to restart, so it is not included here.
        liveness:
          include: livenessState
        # Readiness answers "should traffic be routed here", which a failing
        # database or cache genuinely does change.
        readiness:
          include: readinessState, db, redis
  # The registry's own reachability must not drag down this service's health: if
  # it did, Consul health-checking /actuator/health would couple each service to
  # the very component doing the checking.
  health:
    consul:
      enabled: false
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Levels only. Where the logs go and what shape they take is logback-spring.xml's
# job; Boot applies these after that file is parsed, so this is the one place a
# level can be changed without the two disagreeing. See docs/Logging.md.
logging:
  level:
    root: INFO
    com.observability.lab: INFO
    # The Kafka client logs its entire resolved configuration at INFO on every
    # partition assignment - hundreds of lines per rebalance, none of it about
    # this service.
    org.apache.kafka.clients: WARN
    org.apache.kafka.common.metrics: WARN
    org.springframework.web: INFO
