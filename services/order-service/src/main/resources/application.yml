# ---------------------------------------------------------------------------
# Order Service - base configuration
#
# Settings identical in every environment. Anything that varies belongs in
# application-{local,dev,prod}.yml, and anything secret comes from the
# environment (12-Factor config), never from this file.
#
# Connection settings use ${VAR:default} so the defaults describe a standard
# local stack while any machine can override them without editing tracked
# files. ./scripts/run-service.sh supplies them from docker/compose/.env.
# ---------------------------------------------------------------------------
spring:
  application:
    name: order-service
  profiles:
    default: local
  lifecycle:
    # Grace period the container gets to drain in-flight requests before exit.
    timeout-per-shutdown-phase: 30s
  jackson:
    default-property-inclusion: non_null

  security:
    oauth2:
      resourceserver:
        jwt:
          # Verification keys are fetched lazily from the realm's JWKS endpoint,
          # so the service starts even when Keycloak is not up yet. What is
          # actually asserted on every token - issuer and expiry - is validated
          # by the decoder configured from app.security.issuer-uri below.
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/observability/protocol/openid-connect/certs}

  datasource:
    url: jdbc:postgresql://${ORDER_DB_HOST:localhost}:${ORDER_DB_PORT:5432}/${ORDER_DB_NAME:orderdb}
    username: ${ORDER_DB_USER:order_user}
    password: ${ORDER_DB_PASSWORD:localdev_order_pw}
    hikari:
      pool-name: order-db-pool
      maximum-pool-size: 10
      minimum-idle: 2
      # Fail fast rather than piling up threads behind an unreachable database.
      connection-timeout: 3000
      validation-timeout: 2000
      max-lifetime: 900000

  jpa:
    # Off deliberately. Leaving the session open for the view layer hides lazy
    # loading behind the rendering step, where the resulting N+1 queries are
    # invisible to the service that caused them.
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Hibernate only checks that it matches, so drift
      # between entities and migrations becomes a startup failure.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # No baselining: an existing database without a Flyway history is a
    # situation that needs a human, not a silent assumption.
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s
    web:
      pageable:
        default-page-size: 20
        # A ceiling on what a caller may ask for. Without it, size=1000000 is a
        # single request that loads the whole table into memory.
        max-page-size: 100

  cache:
    type: redis

  cloud:
    openfeign:
      client:
        config:
          inventory-service:
            # Deliberately shorter than this service's own request budget, so a
            # slow dependency surfaces as a 504 here rather than as a timeout
            # experienced by our caller.
            connect-timeout: 2000
            read-timeout: 5000
            logger-level: basic

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # Serializers are set as instances in KafkaConfiguration, not by class name
      # here: naming the class lets Kafka build it with a private ObjectMapper
      # that renders Instant as an epoch decimal, disagreeing with the HTTP API.
      # Durability over throughput: an order event that is acknowledged and then
      # lost leaves stock unreserved with nothing to reconcile against.
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 30000
        request.timeout.ms: 10000

server:
  port: 8081
  shutdown: graceful

# Service identity. Stamped onto every log line, metric tag and span attribute.
app:
  name: ${spring.application.name}
  version: @project.version@
  environment: local

  security:
    # Issuer every token must carry; verified on every request. Kong enforces
    # the same issuer at the edge (infrastructure/kong/kong.yml), so a token is
    # checked against it twice - once at the gateway, once here.
    issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8080/realms/observability}

  kafka:
    topics:
      order-created: order-created

  cache:
    # Short enough that a stale order is a minor annoyance rather than a
    # correctness problem, long enough to absorb a read-heavy burst.
    orders-ttl: 10m

  clients:
    inventory:
      # Timeouts live under spring.cloud.openfeign above, which is where Feign
      # reads them from without a custom Options bean.
      url: ${INVENTORY_SERVICE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        # Deliberately narrow. Prometheus scraping arrives with the metrics step.
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        # Liveness answers "should this container be restarted"; a failing
        # dependency is not a reason to restart, so it is not included here.
        liveness:
          include: livenessState
        # Readiness answers "should traffic be routed here", which a failing
        # database or cache genuinely does change.
        readiness:
          include: readinessState, db, redis
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.observability.lab: INFO
