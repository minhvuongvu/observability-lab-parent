# Local profile: developer workstation, infrastructure via Docker Compose.
# Verbose application logging, full health detail, no external dependencies assumed.
app:
  environment: local

server:
  error:
    include-message: always
    include-stacktrace: on_param

management:
  endpoint:
    health:
      # Safe here and nowhere else: the whole stack is bound to loopback.
      show-details: always

spring:
  jpa:
    # SQL on the console while developing. Never enabled beyond local: it
    # bypasses the log pipeline and can print parameter values.
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.observability.lab: DEBUG
