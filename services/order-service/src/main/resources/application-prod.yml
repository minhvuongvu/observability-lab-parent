# Prod profile: conservative defaults.
# Nothing that leaks internals to a caller, nothing that floods the log pipeline.
spring:
  main:
    banner-mode: "off"
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

app:
  environment: prod

server:
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoint:
    health:
      # Component-level detail names internal hosts and dependency topology.
      show-details: never

springdoc:
  # The schema is a map of the attack surface. It ships to non-production only.
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    com.observability.lab: INFO
