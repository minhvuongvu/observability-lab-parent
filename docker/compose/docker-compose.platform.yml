# ===========================================================================
# Observability Lab - edge and control plane
#
# Reverse proxy, API gateway, identity provider and service registry.
# Combined with docker-compose.yml through COMPOSE_FILE in .env; Keycloak
# depends on the PostgreSQL service declared there, so this file is never
# used on its own.
#
# Policy configuration - Kong routes and plugins, the Keycloak realm, Consul
# KV - belongs to later steps. This file's job is that all four components
# come up healthy, on the right networks, with durable state.
# ===========================================================================

services:

  # -------------------------------------------------------------------------
  # Consul - service registry, health checking and KV configuration store.
  #
  # Single-node server, which is exactly what a bootstrap_expect of 1 means.
  # Real clusters run three or five; one is enough to exercise registration,
  # health and KV, and honest about being a lab.
  # -------------------------------------------------------------------------
  consul:
    image: ${CONSUL_IMAGE}
    container_name: lab-consul
    restart: unless-stopped
    command: ["agent", "-config-dir=/consul/config"]
    # No extra_hosts. Consul HTTP-health-checks the services by the address they
    # register, and both now register a name on lab-net that it can resolve
    # directly - there is no longer a host to hop through.
    environment:
      # The image entrypoint resolves the bind address from this interface.
      # Without it a container with several addresses refuses to start.
      CONSUL_BIND_INTERFACE: eth0
    ports:
      - "${BIND_HOST}:${CONSUL_PORT}:8500"
    volumes:
      - consul-data:/consul/data
      # The single file, not the directory: the image entrypoint chowns
      # /consul/config on startup, which fails if that directory is itself a
      # read-only mount. Mounting the file leaves the directory writable and
      # still keeps the configuration read-only inside the container.
      - ../../infrastructure/consul/config/server.hcl:/consul/config/server.hcl:ro
    networks:
      - lab-net
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 384M

  # -------------------------------------------------------------------------
  # Consul KV seed (one-shot).
  #
  # Writes the shared configuration document into config/application/data once
  # Consul is healthy, then exits. Idempotent - re-running overwrites the same
  # key. The services read it through Spring Cloud Consul Config. Treated as a
  # one-shot by ./scripts/infra.sh, which expects it to exit 0.
  # -------------------------------------------------------------------------
  consul-init:
    image: ${CONSUL_IMAGE}
    container_name: lab-consul-init
    depends_on:
      consul:
        condition: service_healthy
    environment:
      CONSUL_HTTP_ADDR: http://consul:8500
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        consul kv put config/application/data @/consul-kv/application.yaml
        echo "Consul KV seeded: config/application/data"
    volumes:
      - ../../infrastructure/consul/kv/application.yaml:/consul-kv/application.yaml:ro
    networks:
      - lab-net
    restart: "no"

  # -------------------------------------------------------------------------
  # Vault - secret store.
  #
  # Sits beside Consul on purpose. The two divide one job: Consul KV holds
  # configuration, Vault holds secrets, and nothing is allowed to live in both.
  # The dividing line, stated once so it can be applied without re-deciding:
  # a value that could appear in a screenshot is configuration.
  #
  # Runs a real server against a real config file, NOT `-dev`. It therefore
  # boots SEALED - every restart, including the one Docker performs after a
  # machine reboot - and serves nothing until unsealed. ./scripts/vault.sh
  # unseal does that and ./scripts/infra.sh up calls it before the services
  # start. See infrastructure/vault/config/vault.hcl for why that cost is
  # accepted rather than engineered away with dev mode.
  # -------------------------------------------------------------------------
  vault:
    image: ${VAULT_IMAGE}
    container_name: lab-vault
    restart: unless-stopped
    # `server`, and deliberately nothing else. The image's default command runs
    # a dev-mode server, so this line is what makes this a real Vault.
    #
    # Do NOT add -config here. The image entrypoint already appends
    # -config=/vault/config when the first argument is `server`, so passing the
    # file explicitly loads the directory AND the file - the same listener
    # twice - and Vault dies with "address already in use" on its own port,
    # which reads like a host port clash and is not one.
    command: ["server"]
    environment:
      # For the `vault` CLI *inside* this container - the healthcheck below and
      # every exec ./scripts/vault.sh performs. Loopback, not the compose name:
      # this is the process talking to itself.
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      # Vault locks its memory so secrets cannot be paged to disk by the kernel.
      # Without this capability the process refuses to start rather than run
      # with that guarantee quietly missing - which is the correct choice, and
      # the reason this line is not optional.
      - IPC_LOCK
    ports:
      - "${BIND_HOST}:${VAULT_PORT}:8200"
    volumes:
      - vault-data:/vault/file
      # Audit log, on its own volume rather than the services' lab-logs. Two
      # reasons: Vault runs as a different uid and could not write into a
      # directory owned by the services' user, and its audit records have a
      # different schema - mixing them into the pipeline that parses service
      # JSON produces records where every extracted label is empty.
      - vault-logs:/vault/logs
      - ../../infrastructure/vault/config/vault.hcl:/vault/config/vault.hcl:ro
      - ../../infrastructure/vault/policies:/vault/policies:ro
    networks:
      - lab-net
    healthcheck:
      # `vault status` exits 0 only when Vault is initialised AND unsealed.
      # Exit 2 means sealed, exit 1 means unreachable, and both leave this
      # container unhealthy - which is precisely the intent. Anything that
      # depends on Vault having secrets to give must wait for unsealed, not for
      # the process having started.
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      # Short: the process itself starts in under a second. The wait that
      # matters is the unseal, and that is a human or a script, not a boot.
      start_period: 5s
    deploy:
      resources:
        limits:
          # 512M, not the 256M this was first given. mlock reserves its address
          # space up front, so Vault is killed during startup at 256M - and
          # because that happens before it opens its log, the container simply
          # exits 137 with an empty log and no stated reason. `docker inspect
          # --format '{{.State.OOMKilled}}'` is the only place the cause appears.
          memory: 512M

  # -------------------------------------------------------------------------
  # Keycloak - OIDC identity provider.
  #
  # Runs in production mode (`start`), not `start-dev`: persistent PostgreSQL
  # storage, real caching, strict-hostname disabled only because the lab is
  # reached over plain HTTP behind a proxy. Running the same mode as
  # production is the point of a production simulation.
  #
  # First boot performs an automatic build step and is noticeably slower than
  # subsequent boots - start_period accounts for it.
  # -------------------------------------------------------------------------
  keycloak:
    image: ${KEYCLOAK_IMAGE}
    container_name: lab-keycloak
    restart: unless-stopped
    # --import-realm reads every realm file under /opt/keycloak/data/import on
    # boot. The import is idempotent: once the realm exists it is skipped, so
    # this is safe to leave on. Dropping the postgres-data volume is what makes
    # it re-import. The realm pins its own RSA signing key (step 07), so the
    # public key Kong verifies with is deterministic across rebuilds.
    command: ["start", "--import-realm"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      # Bootstrap administrator. Rotate it after first login.
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Health and metrics endpoints on the management port (9000).
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      # Terminating TLS at the proxy, so the container itself serves HTTP.
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "${BIND_HOST}:${KEYCLOAK_PORT}:8080"
    volumes:
      # Read-only realm import. Keycloak only reads this at boot; it never writes
      # back, so the file in version control stays the single source of truth for
      # the realm, its clients, roles, users and signing key.
      - ../../infrastructure/keycloak/realm:/opt/keycloak/data/import:ro
    networks:
      - lab-net
    healthcheck:
      # The image ships no curl or wget. This is the bash socket-redirection
      # form recommended by the Keycloak documentation.
      test:
        - CMD
        - bash
        - -c
        - >-
          { printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0;
          grep -q '200'; } 0<>/dev/tcp/127.0.0.1/9000
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1024M

  # -------------------------------------------------------------------------
  # Kong - API gateway, DB-less.
  #
  # Declarative configuration means the gateway's entire state is a file in
  # version control: reviewable, diffable, and impossible to drift through
  # someone poking the admin API. It also removes a database and a migration
  # job from the stack.
  #
  # Routes, JWT verification and rate limiting are added in step 06; the
  # declarative file currently declares an empty configuration.
  # -------------------------------------------------------------------------
  kong:
    image: ${KONG_IMAGE}
    container_name: lab-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      # Logs to stdout/stderr so the container runtime owns log shipping,
      # rather than files accumulating inside the container.
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_URL: http://localhost:${KONG_MANAGER_PORT}
    ports:
      - "${BIND_HOST}:${KONG_PROXY_PORT}:8000"
      - "${BIND_HOST}:${KONG_ADMIN_PORT}:8001"
      - "${BIND_HOST}:${KONG_MANAGER_PORT}:8002"
    # No extra_hosts. The upstream targets in kong.yml are now the services'
    # own compose names, resolved on lab-net.
    volumes:
      - ../../infrastructure/kong:/opt/kong:ro
    networks:
      - lab-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # -------------------------------------------------------------------------
  # Nginx - single network entry point.
  #
  # It used to sit on lab-edge alone, unable to reach a database however badly
  # misconfigured. That separation is gone with the move to one network; the
  # reasoning is recorded in the networks block of docker-compose.yml. Nginx
  # still proxies only to Kong, which is now a routing fact rather than a
  # network-enforced one.
  # -------------------------------------------------------------------------
  nginx:
    image: ${NGINX_IMAGE}
    container_name: lab-nginx
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
    ports:
      - "${BIND_HOST}:${NGINX_HTTP_PORT}:80"
    volumes:
      - ../../infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - lab-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M

volumes:
  consul-data:
    name: lab-consul-data
  # Vault's storage backend. Deleting this volume destroys every secret AND the
  # unseal keys' ability to open anything - the keys in docker/compose/.vault-keys.json
  # are meaningless without the data they were derived against. `infra.sh destroy`
  # removes both together for that reason.
  vault-data:
    name: lab-vault-data
  # Audit records, tailed into Loki by Promtail. Separate from lab-logs; see the
  # comment on the vault service above.
  vault-logs:
    name: lab-vault-logs
