# ===========================================================================
# Observability Lab - logging pipeline
#
# Combined with the other compose files through COMPOSE_FILE in .env.
#
# Three pipelines carry the same log lines to two different stores:
#
#   services -> JSON file -> Promtail   -> Loki
#   services -> JSON file -> Fluent Bit -> Loki
#   services -> JSON file -> Fluentd    -> OpenSearch   (profile: search)
#
# The services run on the host and write JSON into <repo>/logs; every agent
# bind-mounts that directory read-only. Once the services are containerised the
# agents read the container log driver instead and nothing else changes.
#
# Memory is the reason for the `search` profile. Loki, its two agents and
# Grafana together need about a gigabyte and start with the normal `up`.
# OpenSearch and Elasticsearch need roughly two gigabytes each, which a machine
# already running Oracle and Kafka does not have spare - so they are opt-in:
#
#     docker compose --profile search up -d
#
# See docs/Logging.md.
# ===========================================================================

services:

  # -------------------------------------------------------------------------
  # Loki - log store for the two always-on pipelines.
  #
  # Indexes labels only and compresses the line itself, which is what makes it
  # cheap enough to run beside everything else here. The corollary is that
  # label cardinality is the thing to be careful about; the agents' configs are
  # where that care is actually applied.
  # -------------------------------------------------------------------------
  loki:
    image: ${LOKI_IMAGE}
    container_name: lab-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    user: root
    ports:
      - "${BIND_HOST}:${LOKI_PORT}:3100"
    volumes:
      - ../../infrastructure/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - lab-observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3100/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # -------------------------------------------------------------------------
  # Promtail - pipeline 1. Grafana's own agent, speaks Loki natively.
  # -------------------------------------------------------------------------
  promtail:
    image: ${PROMTAIL_IMAGE}
    container_name: lab-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail.yml"]
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ../../infrastructure/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      # Read-only: an agent that can write to the logs it reads can corrupt the
      # evidence it exists to preserve.
      - ../../logs:/var/log/lab:ro
      - promtail-data:/var/lib/promtail
    networks:
      - lab-observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9080/ready | grep -q Ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  # -------------------------------------------------------------------------
  # Fluent Bit - pipeline 2. Same source and sink as Promtail, different agent:
  # a few megabytes of C rather than a Go runtime, which is what makes it the
  # usual choice for a per-node DaemonSet.
  # -------------------------------------------------------------------------
  fluent-bit:
    image: ${FLUENT_BIT_IMAGE}
    container_name: lab-fluent-bit
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ../../infrastructure/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ../../infrastructure/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ../../logs:/var/log/lab:ro
      - fluent-bit-data:/var/lib/fluent-bit
    networks:
      - lab-observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:2020/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M

  # -------------------------------------------------------------------------
  # Fluentd - pipeline 3, to OpenSearch. Opt-in with the rest of the search
  # stack, since its only destination is part of it.
  # -------------------------------------------------------------------------
  fluentd:
    build:
      context: ../fluentd
      args:
        FLUENTD_VERSION: ${FLUENTD_VERSION}
    image: lab-fluentd:${FLUENTD_VERSION}
    container_name: lab-fluentd
    restart: unless-stopped
    profiles: ["search"]
    depends_on:
      opensearch:
        condition: service_healthy
    volumes:
      - ../../infrastructure/fluentd/fluent.conf:/fluentd/etc/fluent.conf:ro
      - ../../logs:/var/log/lab:ro
      - fluentd-data:/var/lib/fluentd
    networks:
      - lab-observability
    deploy:
      resources:
        limits:
          memory: 512M

  # -------------------------------------------------------------------------
  # OpenSearch - the "index every field" half of the comparison.
  #
  # Single node, security plugin off. Both are lab simplifications and both
  # would be wrong in production: a single node has no redundancy, and
  # disabling security removes authentication from a store that holds every log
  # line the platform produces. The port is bound to loopback.
  # -------------------------------------------------------------------------
  opensearch:
    image: ${OPENSEARCH_IMAGE}
    container_name: lab-opensearch
    restart: unless-stopped
    profiles: ["search"]
    environment:
      discovery.type: single-node
      # Heap. Half the container limit, as the JVM wants room for off-heap.
      OPENSEARCH_JAVA_OPTS: "-Xms768m -Xmx768m"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      # A single-node lab has no second node to replicate to, and a disk-full
      # laptop should not make the index read-only.
      cluster.routing.allocation.disk.threshold_enabled: "false"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "${BIND_HOST}:${OPENSEARCH_PORT}:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - lab-observability
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536M

  opensearch-dashboards:
    image: ${OPENSEARCH_DASHBOARDS_IMAGE}
    container_name: lab-opensearch-dashboards
    restart: unless-stopped
    profiles: ["search"]
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "${BIND_HOST}:${OPENSEARCH_DASHBOARDS_PORT}:5601"
    networks:
      - lab-observability
    deploy:
      resources:
        limits:
          memory: 768M

  # -------------------------------------------------------------------------
  # Elasticsearch and Kibana.
  #
  # OpenSearch forked from Elasticsearch 7.10, so these two stacks are close
  # cousins that have since diverged - in licence, in plugin ecosystem, and
  # increasingly in query features. Both are here because a platform team ends
  # up choosing between them, and the choice is easier having run each.
  #
  # Nothing ships to Elasticsearch by default; it is here to be pointed at.
  # -------------------------------------------------------------------------
  elasticsearch:
    image: ${ELASTICSEARCH_IMAGE}
    container_name: lab-elasticsearch
    restart: unless-stopped
    profiles: ["search"]
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms768m -Xmx768m"
      # Off for the same reason as OpenSearch's, and with the same caveat.
      xpack.security.enabled: "false"
      cluster.routing.allocation.disk.threshold_enabled: "false"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "${BIND_HOST}:${ELASTICSEARCH_PORT}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - lab-observability
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536M

  kibana:
    image: ${KIBANA_IMAGE}
    container_name: lab-kibana
    restart: unless-stopped
    profiles: ["search"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${BIND_HOST}:${KIBANA_PORT}:5601"
    networks:
      - lab-observability
    deploy:
      resources:
        limits:
          memory: 768M

  # -------------------------------------------------------------------------
  # Prometheus - scrapes every component that exposes metrics, evaluates the
  # alert rules, and remote-writes a copy of everything to VictoriaMetrics.
  #
  # Pull rather than push: Prometheus deciding when to scrape means a target
  # that has stopped answering is itself a signal (`up == 0`), which a push
  # model cannot distinguish from a target that is merely idle.
  # -------------------------------------------------------------------------
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: lab-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Short local retention: Prometheus is the alerting engine and the recent
      # window. Anything older is a VictoriaMetrics query.
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle
      # Tempo's metrics generator remote-writes the RED metrics and service
      # graph it derives from spans. Without this receiver those writes are
      # rejected and the service-graph panels stay empty.
      - --web.enable-remote-write-receiver
    extra_hosts:
      # The services run on the host; this is how a container reaches them,
      # exactly as Consul does to health-check them.
      - "host.docker.internal:host-gateway"
    ports:
      - "${BIND_HOST}:${PROMETHEUS_PORT}:9090"
    volumes:
      - ../../infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infrastructure/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - lab-observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9090/-/healthy | grep -q Healthy"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 768M

  # -------------------------------------------------------------------------
  # VictoriaMetrics - the second metrics store.
  #
  # Receives a copy of every sample by remote_write and answers the same
  # PromQL, which is the point of having both: the same input, two engines,
  # comparable from one Grafana. It stores the data considerably more
  # compactly and is the one to query for anything beyond Prometheus' 24h.
  # -------------------------------------------------------------------------
  victoriametrics:
    image: ${VICTORIAMETRICS_IMAGE}
    container_name: lab-victoriametrics
    restart: unless-stopped
    command:
      - --storageDataPath=/victoria-metrics-data
      - --retentionPeriod=30d
      - --httpListenAddr=:8428
      # Deduplicate samples that arrive within the scrape interval, which is
      # what makes a remote_write from two Prometheus replicas idempotent.
      - --dedup.minScrapeInterval=10s
    ports:
      - "${BIND_HOST}:${VICTORIAMETRICS_PORT}:8428"
    volumes:
      - victoriametrics-data:/victoria-metrics-data
    networks:
      - lab-observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8428/health | grep -q OK"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # -------------------------------------------------------------------------
  # OpenTelemetry Collector - one endpoint in, three trace stores out.
  #
  # The services export OTLP to here and nothing else. Changing where traces
  # go is then a change to this container's config rather than a redeploy of
  # every application.
  # -------------------------------------------------------------------------
  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE}
    container_name: lab-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/otel-collector.yml"]
    depends_on:
      tempo:
        condition: service_started
    ports:
      # OTLP gRPC and HTTP, published so the host-run services can reach them.
      - "${BIND_HOST}:${OTLP_GRPC_PORT}:4317"
      - "${BIND_HOST}:${OTLP_HTTP_PORT}:4318"
      # zpages, for inspecting the pipeline when a span does not arrive.
      - "${BIND_HOST}:${OTEL_ZPAGES_PORT}:55679"
    volumes:
      - ../../infrastructure/otel-collector/otel-collector.yml:/etc/otel/otel-collector.yml:ro
    networks:
      - lab-observability
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 384M

  # -------------------------------------------------------------------------
  # Tempo - the trace store Grafana links to from logs and metrics.
  #
  # Also generates RED metrics and a service graph from the spans passing
  # through it and remote-writes them to Prometheus, which is how
  # service-to-service metrics exist without either service producing them.
  # -------------------------------------------------------------------------
  tempo:
    image: ${TEMPO_IMAGE}
    container_name: lab-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    user: root
    ports:
      - "${BIND_HOST}:${TEMPO_PORT}:3200"
    volumes:
      - ../../infrastructure/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - lab-observability
    deploy:
      resources:
        limits:
          memory: 512M

  # -------------------------------------------------------------------------
  # Jaeger - the same spans, a different UI and a different storage model.
  #
  # Speaks OTLP natively, so the collector needs no translation for it. Its
  # trace-comparison and dependency-graph views are genuinely better than
  # Tempo's; its storage is heavier. Running both is how that trade becomes
  # visible rather than theoretical.
  # -------------------------------------------------------------------------
  jaeger:
    image: ${JAEGER_IMAGE}
    container_name: lab-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      # In-memory storage, capped. A restart loses the traces, which is the
      # right trade for a lab and completely wrong for production - where this
      # would be Cassandra, Elasticsearch or OpenSearch.
      SPAN_STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: "20000"
    ports:
      - "${BIND_HOST}:${JAEGER_UI_PORT}:16686"
    networks:
      - lab-observability
    deploy:
      resources:
        limits:
          memory: 512M

  # -------------------------------------------------------------------------
  # Zipkin - the oldest of the three, and the one with its own wire format.
  #
  # Included because its model predates OpenTelemetry and differs from it: the
  # collector converts OTLP into Zipkin JSON, and some attributes therefore
  # look different here than in Tempo for the very same span. Seeing that is
  # more instructive than reading about it.
  # -------------------------------------------------------------------------
  zipkin:
    image: ${ZIPKIN_IMAGE}
    container_name: lab-zipkin
    restart: unless-stopped
    environment:
      STORAGE_TYPE: mem
    ports:
      - "${BIND_HOST}:${ZIPKIN_PORT}:9411"
    networks:
      - lab-observability
    deploy:
      resources:
        limits:
          memory: 384M

  # -------------------------------------------------------------------------
  # Pyroscope - continuous profiling.
  #
  # The fourth signal, and the one that answers a question the other three
  # cannot: *which lines of code* burned the CPU, allocated the heap or held
  # the locks. A metric says the service is slow; a trace says which span was
  # slow; only a profile says which method inside it.
  #
  # "Continuous" is the important word. Traditional profiling means reproducing
  # a problem under a profiler, which is exactly what cannot be done for the
  # incident that happened at 03:00 last Tuesday. Sampling cheaply enough to
  # leave running all the time means the profile already exists when it is
  # needed.
  # -------------------------------------------------------------------------
  pyroscope:
    image: ${PYROSCOPE_IMAGE}
    container_name: lab-pyroscope
    restart: unless-stopped
    # Single-binary mode: ingester, distributor and querier in one process.
    command: ["-config.file=/etc/pyroscope/pyroscope.yml"]
    user: root
    ports:
      - "${BIND_HOST}:${PYROSCOPE_PORT}:4040"
    volumes:
      - ../../infrastructure/pyroscope/pyroscope.yml:/etc/pyroscope/pyroscope.yml:ro
      - pyroscope-data:/data
    networks:
      - lab-observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:4040/ready | grep -q ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 640M

  # -------------------------------------------------------------------------
  # Grafana - where the logs, metrics, traces and profiles are actually read.
  #
  # Datasources and dashboards are provisioned from files rather than clicked
  # in: a dashboard that exists only in someone's browser is not part of the
  # system. Everything here is version-controlled and recreated on a fresh
  # volume.
  # -------------------------------------------------------------------------
  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: lab-grafana
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_started
      pyroscope:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # Anonymous viewing, deliberately: this is a loopback-bound lab and being
      # asked to log in to look at a graph teaches nothing. Editing still
      # requires the admin account.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_LEVEL: warn
    ports:
      - "${BIND_HOST}:${GRAFANA_PORT}:3000"
    volumes:
      - ../../infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - lab-observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/api/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  # The observability stack talks to itself and is reached from the host. It is
  # deliberately not on lab-data: a log shipper has no business being able to
  # reach PostgreSQL or Oracle.
  lab-observability:
    name: lab-observability
    driver: bridge

volumes:
  pyroscope-data:
    name: lab-pyroscope-data
  tempo-data:
    name: lab-tempo-data
  prometheus-data:
    name: lab-prometheus-data
  victoriametrics-data:
    name: lab-victoriametrics-data
  loki-data:
    name: lab-loki-data
  promtail-data:
    name: lab-promtail-data
  fluent-bit-data:
    name: lab-fluent-bit-data
  fluentd-data:
    name: lab-fluentd-data
  opensearch-data:
    name: lab-opensearch-data
  elasticsearch-data:
    name: lab-elasticsearch-data
  grafana-data:
    name: lab-grafana-data
